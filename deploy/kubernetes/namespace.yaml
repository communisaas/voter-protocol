# =============================================================================
# SECURITY CHECKLIST - Namespace Configuration
# =============================================================================
# [x] Pod Security Standards enforced at namespace level (restricted profile)
# [x] PSS enforce mode - non-compliant pods are rejected
# [x] PSS audit mode - violations are logged for monitoring
# [x] PSS warn mode - users receive warnings about violations
# [x] Separate namespaces for production and staging environments
# =============================================================================
# Pod Security Standards Reference:
# - restricted: Most restrictive, follows security best practices
# - baseline: Prevents known privilege escalations
# - privileged: Unrestricted (NOT used here)
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: shadow-atlas-production
  labels:
    name: shadow-atlas-production
    environment: production
    # Pod Security Standards - SECURITY: Enforce restricted profile
    # This ensures all pods meet the highest security standards
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: shadow-atlas-staging
  labels:
    name: shadow-atlas-staging
    environment: staging
    # Pod Security Standards - SECURITY: Enforce restricted profile
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
