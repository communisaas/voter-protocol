# =============================================================================
# SECURITY CHECKLIST - Ingress Configuration
# =============================================================================
# [x] TLS/SSL enforced with automatic certificate management (cert-manager)
# [x] SSL redirect enabled - all HTTP traffic redirected to HTTPS
# [x] CORS restricted to specific allowed origins (not wildcard)
# [x] Rate limiting enabled to prevent DDoS and brute force attacks
# [x] Security headers configured (X-Frame-Options, X-Content-Type-Options, etc.)
# [x] Request body size limited to prevent large payload attacks
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadow-atlas
  namespace: shadow-atlas-production
  annotations:
    # TLS/SSL configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Nginx ingress controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # CORS configuration - SECURITY: Restricted to specific allowed origins
    # DO NOT use wildcard "*" in production - it allows any origin to make requests
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.voter-protocol.org,https://staging.voter-protocol.org,https://voter-protocol.org"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://app.voter-protocol.org https://staging.voter-protocol.org";

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - shadow-atlas.voter-protocol.org
    secretName: shadow-atlas-tls

  rules:
  - host: shadow-atlas.voter-protocol.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shadow-atlas
            port:
              name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadow-atlas-staging
  namespace: shadow-atlas-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - staging-shadow-atlas.voter-protocol.org
    secretName: shadow-atlas-staging-tls

  rules:
  - host: staging-shadow-atlas.voter-protocol.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shadow-atlas
            port:
              name: http
