name: CI

permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-crypto:
    name: Crypto Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run golden vector tests
        run: npx vitest run packages/crypto/test/golden-vectors.test.ts packages/crypto/test/two-tree-vectors.test.ts

  test-shadow-atlas:
    name: Shadow Atlas Serving Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependency (@voter-protocol/crypto)
        run: npm run build -w @voter-protocol/crypto

      - name: Run serving layer tests
        run: npx vitest run packages/shadow-atlas/src/__tests__/unit/serving/

  test-noir-prover:
    name: Noir Prover Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build crypto package
        run: npm run build -w packages/crypto

      - name: Run noir-prover tests
        run: npx vitest run packages/noir-prover/src/prover.test.ts packages/noir-prover/src/two-tree-prover.test.ts

  test-ai-evaluator:
    name: AI Evaluator Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ai-evaluator tests
        run: npx vitest run packages/ai-evaluator/src/__tests__/

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build crypto package
        run: npm run build -w packages/crypto

      - name: Build noir-prover package
        run: npm run build -w packages/noir-prover

      - name: Type check crypto
        run: npx tsc --noEmit -p packages/crypto/tsconfig.json

      - name: Type check shadow-atlas
        run: npx tsc --noEmit -p packages/shadow-atlas/tsconfig.json

      - name: Type check noir-prover
        run: npx tsc --noEmit -p packages/noir-prover/tsconfig.json

      - name: Type check ai-evaluator
        run: npx tsc --noEmit -p packages/ai-evaluator/tsconfig.json

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-crypto, test-shadow-atlas, test-noir-prover, test-ai-evaluator, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo run build

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
