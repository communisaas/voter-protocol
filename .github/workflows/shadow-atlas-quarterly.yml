name: Shadow Atlas Quarterly Update

# Chunked pipeline: build H3 chunks (~8 KB each), export per-district officials,
# validate quality gate, pin UnixFS directory to Storacha (single root CID),
# push CID to Cloudflare Pages secret, update on-chain registry.
#
# Replaces the old monolithic 355 MB pipeline. See:
#   docs/specs/CHUNKED-ATLAS-PIPELINE-SPEC.md (Phase 4)

on:
  workflow_dispatch:
    inputs:
      db_source:
        description: 'Shadow Atlas DB source URL (R2/S3/HTTP)'
        required: true
        type: string
      officials_db_source:
        description: 'Officials DB source URL (defaults to sibling of db_source)'
        required: false
        type: string
        default: ''
      publish_ipfs:
        description: 'Pin directory to IPFS via Storacha'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      push_cids:
        description: 'Push root CID to Cloudflare Pages (requires publish_ipfs)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      update_registry:
        description: 'Update on-chain registry with new CIDs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  # schedule:
  #   # Quarterly: 1st day of Jan, Apr, Jul, Oct at 2 AM UTC
  #   - cron: '0 2 1 1,4,7,10 *'

env:
  NODE_VERSION: '20'
  CHUNKED_OUTPUT_DIR: packages/shadow-atlas/output/chunked

jobs:
  # =========================================================================
  # Phase 1: Build chunked H3→district mapping
  # =========================================================================
  build-chunked:
    name: Build Chunked H3 Mapping
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      total_chunks: ${{ steps.build.outputs.total_chunks }}
      total_cells: ${{ steps.build.outputs.total_cells }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download Shadow Atlas database
        run: |
          echo "Downloading shadow-atlas-full.db..."
          curl -fSL --retry 3 --retry-delay 5 \
            -o shadow-atlas-full.db "${{ inputs.db_source }}"
          ls -lh shadow-atlas-full.db

      - name: Build chunked mapping
        id: build
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p output/chunked

          npx tsx scripts/build-chunked-mapping.ts \
            ../../shadow-atlas-full.db \
            output/chunked/

          # Extract stats from the manifest
          TOTAL_CHUNKS=$(jq -r '
            [.countries[].layers[].chunkCount] | add // 0
          ' output/chunked/manifest.json)
          TOTAL_CELLS=$(jq -r '
            [.countries[].layers[].cellCount] | add // 0
          ' output/chunked/manifest.json)

          echo "total_chunks=$TOTAL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT

          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total chunks:** $TOTAL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Total cells:** $TOTAL_CELLS" >> $GITHUB_STEP_SUMMARY
          echo "- **Output directory:** output/chunked/" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2a: Export per-district officials files (depends on build-chunked)
  # =========================================================================
  export-officials:
    name: Export Officials Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Download officials database
        run: |
          # Use explicit officials_db_source if provided, otherwise derive from db_source
          if [ -n "${{ inputs.officials_db_source }}" ]; then
            OFFICIALS_URL="${{ inputs.officials_db_source }}"
          else
            DB_URL="${{ inputs.db_source }}"
            OFFICIALS_URL="${DB_URL%/*}/officials.db"
          fi

          echo "Downloading officials DB from: $OFFICIALS_URL"
          curl -fSL --retry 3 --retry-delay 5 \
            -o officials.db "$OFFICIALS_URL"
          ls -lh officials.db

      - name: Export officials to chunked directory
        working-directory: packages/shadow-atlas
        run: |
          npx tsx scripts/export-officials.ts \
            --db ../../officials.db \
            --output output/chunked/

          # Count exported files
          OFFICIALS_COUNT=$(find output/chunked/ -path '*/officials/*.json' | wc -l | tr -d ' ')
          echo "Exported $OFFICIALS_COUNT officials files"

          echo "### Officials Export" >> $GITHUB_STEP_SUMMARY
          echo "- **Files exported:** $OFFICIALS_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload updated chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2b: Build Cell Tree Snapshot (parallel with export-officials)
  # =========================================================================
  build-cell-tree-snapshot:
    name: Build Cell Tree Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Build cell tree snapshot
        working-directory: packages/shadow-atlas
        run: |
          # build-cell-tree-snapshot reads from the chunked directory structure
          npx tsx scripts/build-cell-tree-snapshot.ts \
            --from output/chunked/ \
            --output output/chunked/US/merkle/cell-tree-snapshot.json

          ls -lh output/chunked/US/merkle/cell-tree-snapshot.json

          echo "### Cell Tree Snapshot" >> $GITHUB_STEP_SUMMARY
          SNAPSHOT_SIZE=$(ls -lh output/chunked/US/merkle/cell-tree-snapshot.json | awk '{print $5}')
          echo "- **Snapshot size:** $SNAPSHOT_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload cell tree snapshot into chunked output
        uses: actions/upload-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/cell-tree-snapshot.json
          retention-days: 180

  # =========================================================================
  # Phase 2c: Generate Cell Chunks + District Index (depends on cell tree snapshot)
  # =========================================================================
  generate-cell-chunks:
    name: Generate Cell Chunks + District Index
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-cell-tree-snapshot]
    outputs:
      total_cell_chunks: ${{ steps.generate.outputs.total_cell_chunks }}
      total_cells: ${{ steps.generate.outputs.total_cells }}
      populated_slots: ${{ steps.generate.outputs.populated_slots }}
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Download chunked build (for existing districts/officials)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/

      - name: Cache TIGER tract centroids
        uses: actions/cache@v4
        with:
          path: packages/shadow-atlas/data/baf-cache
          key: tiger-centroids-2024-${{ hashFiles('packages/shadow-atlas/src/hydration/tract-centroid-index.ts') }}
          restore-keys: |
            tiger-centroids-2024-

      - name: Generate cell chunks and district index
        id: generate
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p data/baf-cache

          npx tsx scripts/generate-cell-chunks.ts \
            --snapshot output/chunked/US/merkle/cell-tree-snapshot.json \
            --output output/chunked \
            --cache-dir data/baf-cache

          # Extract stats
          TOTAL_CELL_CHUNKS=$(jq -r '.totalChunks' output/chunked/US/manifest-cells.json)
          TOTAL_CELLS=$(jq -r 'reduce (.chunks | to_entries[].value.cellCount) as $c (0; . + $c)' output/chunked/US/manifest-cells.json 2>/dev/null || echo "N/A")
          POPULATED_SLOTS=$(jq -r '.slots | keys | length' output/chunked/US/district-index.json)

          echo "total_cell_chunks=$TOTAL_CELL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT
          echo "populated_slots=$POPULATED_SLOTS" >> $GITHUB_OUTPUT

          echo "### Cell Chunks + District Index" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell chunks:** $TOTAL_CELL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Populated district slots:** $POPULATED_SLOTS of 24" >> $GITHUB_STEP_SUMMARY
          echo "- **District index size:** $(ls -lh output/chunked/US/district-index.json | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

          # Count unique congressional districts
          CD_COUNT=$(jq -r '.slots["0"] | keys | length' output/chunked/US/district-index.json 2>/dev/null || echo "N/A")
          echo "- **Congressional districts:** $CD_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output with cell chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 3: Validate build (quality gate — blocks IPFS pin on failure)
  # =========================================================================
  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [export-officials, build-cell-tree-snapshot, generate-cell-chunks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download complete build (with cell chunks)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/

      - name: Run validation checks
        working-directory: packages/shadow-atlas
        run: |
          # validate-build.ts exits non-zero on any failure.
          # This gates the entire downstream pipeline.
          npx tsx scripts/validate-build.ts output/chunked/

          echo "### Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** PASSED (all 7 checks)" >> $GITHUB_STEP_SUMMARY

      - name: Upload validated output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 4: Pin directory to IPFS via Storacha (single root CID)
  # =========================================================================
  publish-ipfs:
    name: Pin to IPFS (Directory)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [validate-build]
    if: inputs.publish_ipfs != 'false'
    outputs:
      root_cid: ${{ steps.pin.outputs.root_cid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download validated build
        uses: actions/download-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/

      - name: Pin directory to Storacha
        id: pin
        working-directory: packages/shadow-atlas
        env:
          STORACHA_SPACE_DID: ${{ secrets.STORACHA_SPACE_DID }}
          STORACHA_AGENT_KEY: ${{ secrets.STORACHA_AGENT_KEY }}
          STORACHA_PROOF: ${{ secrets.STORACHA_PROOF }}
        run: |
          npx tsx scripts/pin-to-ipfs.ts \
            --directory output/chunked/ \
            --output output/pin-results.json

          # Extract root CID for downstream jobs
          ROOT_CID=$(jq -r '.rootCid' output/pin-results.json)
          echo "root_cid=$ROOT_CID" >> $GITHUB_OUTPUT
          echo "Root CID: $ROOT_CID"

      - name: Write IPFS summary
        run: |
          ROOT_CID=$(jq -r '.rootCid' packages/shadow-atlas/output/pin-results.json)
          TIMESTAMP=$(jq -r '.timestamp' packages/shadow-atlas/output/pin-results.json)
          VERIFIED=$(jq -r '.verified // "unknown"' packages/shadow-atlas/output/pin-results.json)

          echo "## IPFS Pinning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Root CID** | \`$ROOT_CID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $TIMESTAMP |" >> $GITHUB_STEP_SUMMARY
          echo "| **Verified** | $VERIFIED |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Chunks** | ${{ needs.validate-build.result == 'success' && needs.build-chunked.outputs.total_chunks || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Cells** | ${{ needs.validate-build.result == 'success' && needs.build-chunked.outputs.total_cells || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gateway Links" >> $GITHUB_STEP_SUMMARY
          echo "- [manifest.json](https://storacha.link/ipfs/$ROOT_CID/manifest.json)" >> $GITHUB_STEP_SUMMARY
          echo "- [Root directory](https://storacha.link/ipfs/$ROOT_CID/)" >> $GITHUB_STEP_SUMMARY
          echo "- [dweb.link mirror](https://storacha.link/ipfs/$ROOT_CID/manifest.json)" >> $GITHUB_STEP_SUMMARY

      - name: Upload pin results
        uses: actions/upload-artifact@v4
        with:
          name: pin-results
          path: packages/shadow-atlas/output/pin-results.json
          retention-days: 180

  # =========================================================================
  # Phase 5a: Push root CID to Cloudflare Pages secret
  # =========================================================================
  push-cids:
    name: Push CID to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-ipfs]
    if: inputs.publish_ipfs != 'false' && inputs.push_cids != 'false'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download pin results
        uses: actions/download-artifact@v4
        with:
          name: pin-results
          path: packages/shadow-atlas/output/

      - name: Push CID to Cloudflare Pages
        working-directory: packages/shadow-atlas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/push-cids.ts \
            --pin-results output/pin-results.json \
            --project commons

          ROOT_CID=$(jq -r '.rootCid' output/pin-results.json)
          echo "### CID Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Root CID:** \`$ROOT_CID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** commons" >> $GITHUB_STEP_SUMMARY
          echo "- **Secret:** IPFS_CID_ROOT" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Updated" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Phase 5b: Update on-chain registry (stub — future implementation)
  # =========================================================================
  update-registry:
    name: Update On-Chain Registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-ipfs]
    if: inputs.update_registry == 'true'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Download pin results
        uses: actions/download-artifact@v4
        with:
          name: pin-results
          path: packages/shadow-atlas/output/

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Extract snapshot root and CID
        id: extract-root
        run: |
          ROOT=$(jq -r '.root' packages/shadow-atlas/output/chunked/US/merkle/cell-tree-snapshot.json)
          CID=$(jq -r '.rootCid' packages/shadow-atlas/output/pin-results.json)
          echo "cell_map_root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "ipfs_cid=$CID" >> "$GITHUB_OUTPUT"
          echo "Cell map root: $ROOT"
          echo "IPFS CID: $CID"

      - name: Update on-chain registry
        working-directory: contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.SCROLL_RPC_URL }}
          CELL_MAP_ROOT: ${{ steps.extract-root.outputs.cell_map_root }}
          IPFS_CID: ${{ steps.extract-root.outputs.ipfs_cid }}
          EPOCH: ${{ github.run_number }}
          SNAPSHOT_ANCHOR_ADDRESS: ${{ vars.SNAPSHOT_ANCHOR_ADDRESS }}
        run: |
          forge script script/UpdateSnapshot.s.sol:UpdateSnapshot \
            --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY" --broadcast

          echo "### On-Chain Registry Update" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell Map Root:** \`$CELL_MAP_ROOT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **IPFS CID:** \`$IPFS_CID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Epoch:** $EPOCH" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Notifications
  # =========================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build-chunked
      - export-officials
      - build-cell-tree-snapshot
      - generate-cell-chunks
      - validate-build
      - publish-ipfs
      - push-cids
      - update-registry
    if: always()
    steps:
      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const totalChunks = '${{ needs.build-chunked.outputs.total_chunks }}' || 'N/A';
            const totalCells = '${{ needs.build-chunked.outputs.total_cells }}' || 'N/A';
            const rootCid = '${{ needs.publish-ipfs.outputs.root_cid }}' || 'N/A';

            const title = `Shadow Atlas Quarterly Update - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Quarterly Shadow Atlas Update (Chunked Pipeline)',
              '',
              `**Date:** ${new Date().toISOString()}`,
              '',
              '### Pipeline Results',
              '| Job | Status |',
              '|-----|--------|',
              `| Build Chunked Mapping | ${{ needs.build-chunked.result }} |`,
              `| Export Officials | ${{ needs.export-officials.result }} |`,
              `| Build Cell Tree | ${{ needs.build-cell-tree-snapshot.result }} |`,
              `| Generate Cell Chunks | ${{ needs.generate-cell-chunks.result }} |`,
              `| Validate Build | ${{ needs.validate-build.result }} |`,
              `| Pin to IPFS | ${{ needs.publish-ipfs.result }} |`,
              `| Push CIDs | ${{ needs.push-cids.result }} |`,
              `| Update Registry | ${{ needs.update-registry.result }} |`,
              '',
              '### Build Metrics',
              `- **Total chunks:** ${totalChunks}`,
              `- **Total cells:** ${totalCells}`,
              `- **Root CID:** \`${rootCid}\``,
              `- **Cell chunks:** ${{ needs.generate-cell-chunks.outputs.total_cell_chunks || 'N/A' }}`,
              `- **District slots:** ${{ needs.generate-cell-chunks.outputs.populated_slots || 'N/A' }}/24`,
              `- **Resolution:** 7 (child) / 3 (parent) — ~5.16 km² per cell`,
              '',
              '### Gateway Links',
              rootCid !== 'N/A' ? [
                `- [manifest.json](https://storacha.link/ipfs/${rootCid}/manifest.json)`,
                `- [Root directory](https://storacha.link/ipfs/${rootCid}/)`,
              ].join('\n') : '- *IPFS pinning was skipped or failed*',
              '',
              '---',
              '*Automatically created by the quarterly update workflow (chunked pipeline v3).*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['quarterly-update', 'shadow-atlas', 'automated']
            });

      - name: Notify Slack (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ROOT_CID="${{ needs.publish-ipfs.outputs.root_cid }}"
          TOTAL_CHUNKS="${{ needs.build-chunked.outputs.total_chunks }}"
          BUILD_RESULT="${{ needs.build-chunked.result }}"
          VALIDATE_RESULT="${{ needs.validate-build.result }}"
          PIN_RESULT="${{ needs.publish-ipfs.result }}"

          curl -fsSL -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"Shadow Atlas Quarterly Update Complete\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Shadow Atlas Quarterly Update*\n• Build: ${BUILD_RESULT}\n• Validation: ${VALIDATE_RESULT}\n• IPFS Pin: ${PIN_RESULT}\n• Chunks: ${TOTAL_CHUNKS}\n• Root CID: \`${ROOT_CID:-N/A}\`\"
                  }
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

  # =========================================================================
  # Cleanup old artifacts (keep last 4 quarters = 1 year)
  # =========================================================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [notify]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const ARTIFACT_NAMES = [
              'chunked-build',
              'chunked-with-officials',
              'cell-tree-snapshot',
              'chunked-validated',
              'chunked-with-cell-chunks',
              'pin-results',
              // Legacy artifact names (from old monolithic pipeline)
              'h3-mapping',
              'officials',
            ];

            const artifactsResponse = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const relevantArtifacts = artifactsResponse.data.artifacts
              .filter(a => ARTIFACT_NAMES.includes(a.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Group by name, keep last 4 of each (1 year of quarterly runs)
            const counts = {};
            for (const artifact of relevantArtifacts) {
              counts[artifact.name] = (counts[artifact.name] || 0) + 1;
              if (counts[artifact.name] > 4) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  console.log(`Deleted artifact: ${artifact.name} (${artifact.created_at})`);
                } catch (e) {
                  console.log(`Failed to delete artifact ${artifact.name}: ${e.message}`);
                }
              }
            }
