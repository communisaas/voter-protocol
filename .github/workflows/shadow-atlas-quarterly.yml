name: Shadow Atlas Quarterly Update

# Chunked pipeline: build H3 chunks (~8 KB each), export per-district officials,
# validate quality gate, upload to R2 (production read path), push ATLAS_BASE_URL
# to Cloudflare Pages, update on-chain registry.
#
# IPFS pinning (publish-ipfs job + Storacha) was removed 2026-05-02 with the
# Storacha sunset. R2 (atlas.commons.email) is now the production read path.
# When IPFS pinning resumes, restore a `publish-ipfs` job ahead of `push-cids`
# and add `--pin-results` back to the push-cids invocation.
#
# See: docs/specs/CHUNKED-ATLAS-PIPELINE-SPEC.md (Phase 4)

on:
  workflow_dispatch:
    inputs:
      expected_manifest_sha256:
        description: 'sha256 of source/manifest.json. Required when db_source is empty. Operators paste the value emitted by `npm run publish:source`.'
        required: false
        type: string
        default: ''
      db_source:
        description: 'Override Shadow Atlas DB URL. Leave empty to resolve from manifest. Requires db_source_sha256 unless allow_unverified.'
        required: false
        type: string
        default: ''
      db_source_sha256:
        description: 'sha256 of override db_source. Required when db_source is set unless allow_unverified="I-UNDERSTAND".'
        required: false
        type: string
        default: ''
      officials_db_source:
        description: 'Override officials DB URL. Empty resolves from manifest. Requires officials_db_source_sha256 unless allow_unverified.'
        required: false
        type: string
        default: ''
      officials_db_source_sha256:
        description: 'sha256 of override officials_db_source. Required when officials_db_source is set unless allow_unverified="I-UNDERSTAND".'
        required: false
        type: string
        default: ''
      allow_unverified:
        description: 'Type "I-UNDERSTAND" to skip SHA verification on override URLs. Friction is intentional.'
        required: false
        type: string
        default: ''
      push_cids:
        description: 'Push ATLAS_BASE_URL to Cloudflare Pages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      update_registry:
        description: 'Update on-chain registry with new R2 URL + cellMapRoot'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      tiger_vintage:
        description: 'TIGER20YY e.g. TIGER2024; default unknown FAILS by design — operator sets the real value'
        required: false
        type: string
        default: 'unknown'
      nad_vintage:
        description: 'NAD release compile date YYYY-MM-DD e.g. 2026-06-30; default unknown FAILS by design — operator sets the real value'
        required: false
        type: string
        default: 'unknown'
      addrfeat_vintage:
        description: 'TIGER20YY ADDRFEAT vintage e.g. TIGER2025; default unknown FAILS by design — operator sets the real value'
        required: false
        type: string
        default: 'unknown'
      nad_url:
        description: 'NAD text-release zip URL (streamed through funzip, never stored on disk). Empty skips NAD (src:0) and builds a ranges-only index.'
        required: false
        type: string
        default: 'https://data.transportation.gov/download/fc2s-wawr/application/x-zip-compressed'
      address_states:
        description: 'CSV of states for the address index (e.g. DE,RI,DC). Empty = all states.'
        required: false
        type: string
        default: ''
  # QUARTERLY STALENESS ALARM — not an auto-publish. On a `schedule` event the
  # `inputs` context is empty, so tiger_vintage resolves to 'unknown' and
  # resolveTigerVintage(dryRun:false) THROWS before any manifest is written — the
  # build-chunked job fails fast and nothing is published. This is intentional and
  # fail-closed: a silent stale publish is impossible. A RED quarterly run means
  # "time to republish" — the operator runs this workflow via workflow_dispatch
  # with a real TIGER20YY tiger_vintage (+ manifest SHA / trust pins) to actually
  # publish. The schedule is the reminder; the dispatch is the publish.
  schedule:
    - cron: '0 2 1 1,4,7,10 *'

# Serialize quarterly publishes — two operators triggering simultaneously
# would clobber each other's `chunked-build` artifact (download-artifact@v4
# resolves by name, not run_id). cancel-in-progress=false because killing
# a running publish mid-broadcast on Scroll would be worse than queueing.
concurrency:
  group: shadow-atlas-quarterly
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  CHUNKED_OUTPUT_DIR: packages/shadow-atlas/output/chunked
  # Source manifest published by `npm run publish:source` in shadow-atlas.
  # Public-readable through the Atlas Worker. The resolve-source-version
  # step in jobs that consume the SQLite reads `currentVersion` here and
  # builds db_url + officials_url + their expected SHA-256 from it.
  ATLAS_SOURCE_MANIFEST: 'https://atlas.commons.email/source/manifest.json'

jobs:
  # =========================================================================
  # Phase 0: Resolve source artifacts ONCE so every consumer job sees the
  # same version. Two jobs each fetching the manifest independently would
  # frankenstein-blend versions if `publish:source` lands mid-run.
  # =========================================================================
  resolve-source:
    name: Resolve Source Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      epoch: ${{ steps.resolve.outputs.epoch }}
      db_url: ${{ steps.resolve.outputs.db_url }}
      db_sha: ${{ steps.resolve.outputs.db_sha }}
      officials_url: ${{ steps.resolve.outputs.officials_url }}
      officials_sha: ${{ steps.resolve.outputs.officials_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve manifest + override discipline
        id: resolve
        # Resolution order:
        #   1. If override URLs present, require matching sha256 (or
        #      allow_unverified="I-UNDERSTAND") — silent SHA-skip is a
        #      footgun.
        #   2. Otherwise, fetch manifest body and trust it via:
        #      Ed25519 signature (preferred when public key set) +
        #      operator-pasted sha256 pin + allow_unverified.
        #   3. Use `jq -er` and require exactly one matching build entry
        #      so duplicate or empty results fail loud rather than
        #      silently producing multi-line GITHUB_OUTPUT (output
        #      injection vector).
        #   4. Constrain resolved URLs to atlas.commons.email so a
        #      poisoned manifest can't redirect downloads to an
        #      attacker-controlled origin.
        #
        # Why aws CLI not curl: Cloudflare's edge security layer (Bot
        # Fight Mode / Bot Management) flags GitHub Actions runner IPs
        # as datacenter bots and 403s requests to atlas.commons.email
        # regardless of User-Agent. The S3-compatible R2 endpoint
        # (`<account>.r2.cloudflarestorage.com`) does NOT route through
        # the CDN security layer and accepts SigV4-authenticated reads.
        # Browser fetches still go through atlas.commons.email; only CI
        # uses the S3 path.
        env:
          MANIFEST_SIGNING_PUBLIC_KEY: ${{ vars.MANIFEST_SIGNING_PUBLIC_KEY }}
          # SigV4 creds for the S3-compat endpoint. Same trust tier as
          # CLOUDFLARE_API_TOKEN; bucket-scoped Object R/W on shadow-atlas.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: shadow-atlas
        run: |
          set -euo pipefail

          ALLOW="${{ inputs.allow_unverified }}"
          DB_OVERRIDE="${{ inputs.db_source }}"
          DB_OVERRIDE_SHA="${{ inputs.db_source_sha256 }}"
          OFF_OVERRIDE="${{ inputs.officials_db_source }}"
          OFF_OVERRIDE_SHA="${{ inputs.officials_db_source_sha256 }}"
          MANIFEST_SHA_PIN="${{ inputs.expected_manifest_sha256 }}"

          require_sha() {
            local url="$1" sha="$2" label="$3"
            if [ -n "$url" ] && [ -z "$sha" ] && [ "$ALLOW" != "I-UNDERSTAND" ]; then
              echo "Override $label requires its sha256 input, or allow_unverified=I-UNDERSTAND." >&2
              exit 1
            fi
          }
          require_sha "$DB_OVERRIDE" "$DB_OVERRIDE_SHA" "db_source"
          require_sha "$OFF_OVERRIDE" "$OFF_OVERRIDE_SHA" "officials_db_source"

          guard_url() {
            # Origin pinning. Override URLs are operator-typed and may
            # legitimately point elsewhere; manifest-resolved URLs MUST
            # be on atlas.commons.email to limit blast radius of a
            # poisoned manifest.
            local url="$1" label="$2" allow_external="$3"
            case "$url" in
              *$'\n'*)
                echo "$label contains newline — refusing." >&2; exit 1;;
            esac
            if [ "$allow_external" != "true" ]; then
              case "$url" in
                https://atlas.commons.email/*) ;;
                *) echo "$label not on atlas.commons.email: $url" >&2; exit 1;;
              esac
            fi
          }

          if [ -n "$DB_OVERRIDE" ] || [ -n "$OFF_OVERRIDE" ]; then
            guard_url "$DB_OVERRIDE" "db_source" "true"
            guard_url "$OFF_OVERRIDE" "officials_db_source" "true"
          fi

          if [ -n "$DB_OVERRIDE" ]; then
            DB_URL="$DB_OVERRIDE"
            DB_SHA="$DB_OVERRIDE_SHA"
            VERSION="override"
          fi
          if [ -n "$OFF_OVERRIDE" ]; then
            OFF_URL="$OFF_OVERRIDE"
            OFF_SHA="$OFF_OVERRIDE_SHA"
          fi

          if [ -z "${DB_URL:-}" ] || [ -z "${OFF_URL:-}" ]; then
            echo "Fetching source/manifest.json from s3://${R2_BUCKET} (via R2 S3 endpoint, browsers use ${ATLAS_SOURCE_MANIFEST})"

            # Write curl output directly to a tmpfile rather than via
            # `$(curl ...)` capture. POSIX command substitution strips
            # ALL trailing newlines, which would (a) make every signed
            # publish fail Ed25519 verification — publish-source.ts signs
            # the exact bytes including the trailing `\n`, and (b) make
            # the operator-pasted sha-pin always mismatch.
            MANIFEST_TMP=$(mktemp)
            SIG_TMP=$(mktemp)
            PUBKEY_TMP=$(mktemp)
            trap 'rm -f "$MANIFEST_TMP" "$SIG_TMP" "$PUBKEY_TMP"' EXIT

            # Fetch via S3-compat (bypasses CF Bot Management). aws CLI
            # is preinstalled on ubuntu-latest runners. --no-sign-request
            # is NOT used — R2 buckets are private by default and the
            # SigV4 auth covers the read.
            aws s3api get-object \
              --bucket "$R2_BUCKET" \
              --key "source/manifest.json" \
              --endpoint-url "$R2_ENDPOINT" \
              "$MANIFEST_TMP" >/dev/null

            # Trust the manifest body via, in priority order:
            #   1. Ed25519 signature (if MANIFEST_SIGNING_PUBLIC_KEY is
            #      set) — the deepest defense; an R2-write compromise
            #      alone can't forge a valid sig.
            #   2. Operator-pasted sha256 pin (`expected_manifest_sha256`).
            #   3. allow_unverified="I-UNDERSTAND" (ad-hoc test runs).
            # Active defenses are additive (multiple may apply), not
            # alternatives. At least one must succeed.
            VERIFIED_VIA=""
            if [ -n "${MANIFEST_SIGNING_PUBLIC_KEY:-}" ]; then
              echo "Verifying manifest Ed25519 signature..."
              if ! aws s3api get-object \
                --bucket "$R2_BUCKET" \
                --key "source/manifest.json.sig" \
                --endpoint-url "$R2_ENDPOINT" \
                "$SIG_TMP" >/dev/null 2>&1; then
                echo "Public key is set but no signature exists at ${ATLAS_SOURCE_MANIFEST}.sig" >&2
                echo "Either: (a) the publisher didn't sign — run publish:source with MANIFEST_SIGNING_PRIVATE_KEY set," >&2
                echo "or (b) the .sig was deleted post-publish — re-publish with signing enabled." >&2
                exit 1
              fi
              if ! npx tsx packages/shadow-atlas/scripts/verify-manifest.ts \
                --manifest "$MANIFEST_TMP" \
                --signature "$SIG_TMP" \
                --public-key env:MANIFEST_SIGNING_PUBLIC_KEY; then
                echo "Manifest signature verification FAILED — aborting." >&2
                exit 1
              fi
              VERIFIED_VIA="ed25519"
            fi

            if [ -n "$MANIFEST_SHA_PIN" ]; then
              GOT=$(sha256sum "$MANIFEST_TMP" | awk '{print $1}')
              if [ "$GOT" != "$MANIFEST_SHA_PIN" ]; then
                echo "Manifest sha mismatch: $GOT vs pin $MANIFEST_SHA_PIN" >&2
                exit 1
              fi
              echo "Manifest pin verified ($GOT)"
              VERIFIED_VIA="${VERIFIED_VIA:+$VERIFIED_VIA+}sha-pin"
            fi

            if [ -z "$VERIFIED_VIA" ]; then
              if [ -z "$DB_OVERRIDE" ] && [ "$ALLOW" != "I-UNDERSTAND" ]; then
                echo "Manifest body is unverified. Provide one of:" >&2
                echo "  - MANIFEST_SIGNING_PUBLIC_KEY workflow var (Ed25519 sig)" >&2
                echo "  - expected_manifest_sha256 input (operator-pasted sha)" >&2
                echo "  - allow_unverified=I-UNDERSTAND (ad-hoc test runs only)" >&2
                exit 1
              fi
              echo "Manifest unverified (allow_unverified=I-UNDERSTAND)."
              VERIFIED_VIA="unverified"
            fi
            echo "Manifest trust: $VERIFIED_VIA"

            VERSION=$(jq -er '.currentVersion' < "$MANIFEST_TMP")

            if [ -z "${DB_URL:-}" ]; then
              DB_URL=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["shadow-atlas-full.db"].url end' < "$MANIFEST_TMP")
              DB_SHA=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["shadow-atlas-full.db"].sha256 end' < "$MANIFEST_TMP")
              guard_url "$DB_URL" "db_url (manifest)" "false"
            fi
            if [ -z "${OFF_URL:-}" ]; then
              OFF_URL=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["officials.db"].url end' < "$MANIFEST_TMP")
              OFF_SHA=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["officials.db"].sha256 end' < "$MANIFEST_TMP")
              guard_url "$OFF_URL" "officials_url (manifest)" "false"
            fi
          fi

          # Deterministic epoch derived from the version tag, NOT from
          # github.run_number — failed reruns must not increment the
          # on-chain epoch beyond what the operator intended.
          if [[ "$VERSION" =~ ^v([0-9]{8})$ ]]; then
            EPOCH="${BASH_REMATCH[1]}"
          else
            # Override path: fall back to a synthetic epoch from a SHA
            # prefix to avoid run_number drift on retries.
            EPOCH=$(printf '%s' "${DB_URL}${DB_SHA}" | sha256sum | awk '{print "0x" substr($1,1,8)}')
            EPOCH=$((EPOCH))
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "epoch=$EPOCH" >> "$GITHUB_OUTPUT"
          echo "db_url=$DB_URL" >> "$GITHUB_OUTPUT"
          echo "db_sha=$DB_SHA" >> "$GITHUB_OUTPUT"
          echo "officials_url=$OFF_URL" >> "$GITHUB_OUTPUT"
          echo "officials_sha=$OFF_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION epoch=$EPOCH"
          echo "  db: $DB_URL"
          echo "  officials: $OFF_URL"

  # =========================================================================
  # Phase 1: Build chunked H3→district mapping
  # =========================================================================
  build-chunked:
    name: Build Chunked H3 Mapping
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [resolve-source]
    outputs:
      total_chunks: ${{ steps.build.outputs.total_chunks }}
      total_cells: ${{ steps.build.outputs.total_cells }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download Shadow Atlas database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: shadow-atlas
        run: |
          set -euo pipefail
          DB_URL="${{ needs.resolve-source.outputs.db_url }}"
          DB_SHA="${{ needs.resolve-source.outputs.db_sha }}"
          # The manifest stores public Worker URLs (atlas.commons.email/...).
          # Translate to the R2 object key by stripping the host. Both
          # surfaces back the same bucket; the path after the host is the
          # R2 key verbatim.
          DB_KEY="${DB_URL#https://atlas.commons.email/}"
          echo "Downloading via S3-compat: s3://$R2_BUCKET/$DB_KEY"
          aws s3api get-object \
            --bucket "$R2_BUCKET" \
            --key "$DB_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            shadow-atlas-full.db >/dev/null
          ls -lh shadow-atlas-full.db

          if [ -n "$DB_SHA" ]; then
            echo "Verifying SHA-256 against resolved expected value..."
            echo "$DB_SHA  shadow-atlas-full.db" | sha256sum -c -
          else
            echo "No expected SHA available (override path with allow_unverified); skipping verification."
          fi

      - name: Download officials database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: shadow-atlas
        run: |
          set -euo pipefail
          URL="${{ needs.resolve-source.outputs.officials_url }}"
          SHA="${{ needs.resolve-source.outputs.officials_sha }}"
          KEY="${URL#https://atlas.commons.email/}"
          echo "Downloading officials DB via S3-compat: s3://$R2_BUCKET/$KEY"
          aws s3api get-object \
            --bucket "$R2_BUCKET" \
            --key "$KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            officials.db >/dev/null
          ls -lh officials.db

          if [ -n "$SHA" ]; then
            echo "Verifying SHA-256 against resolved expected value..."
            echo "$SHA  officials.db" | sha256sum -c -
          else
            echo "No expected SHA available (override path with allow_unverified); skipping verification."
          fi

      - name: Build chunked mapping
        id: build
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p output/chunked

          npx tsx scripts/build-chunked-mapping.ts \
            ../../shadow-atlas-full.db \
            output/chunked/ \
            --tiger-vintage "${{ inputs.tiger_vintage || 'unknown' }}" \
            --officials-db ../../officials.db

          # Extract stats from the per-country manifest. The build script
          # namespaces by country (output/chunked/<COUNTRY>/manifest.json)
          # rather than emitting a root aggregate; this loop sums across
          # whatever countries are present so adding a second country
          # later (CA/GB/AU) doesn't silently undercount.
          TOTAL_CHUNKS=0
          TOTAL_CELLS=0
          for m in output/chunked/*/manifest.json; do
            [ -f "$m" ] || continue
            TOTAL_CHUNKS=$((TOTAL_CHUNKS + $(jq -r '.totalChunks // 0' "$m")))
            TOTAL_CELLS=$((TOTAL_CELLS + $(jq -r '.totalCells // 0' "$m")))
          done

          echo "total_chunks=$TOTAL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT

          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total chunks:** $TOTAL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Total cells:** $TOTAL_CELLS" >> $GITHUB_STEP_SUMMARY
          echo "- **Output directory:** output/chunked/" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2a: Export per-district officials files (depends on build-chunked)
  # =========================================================================
  export-officials:
    name: Export Officials Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve-source, build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Download officials database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: shadow-atlas
        run: |
          set -euo pipefail
          URL="${{ needs.resolve-source.outputs.officials_url }}"
          SHA="${{ needs.resolve-source.outputs.officials_sha }}"
          KEY="${URL#https://atlas.commons.email/}"
          echo "Downloading officials DB via S3-compat: s3://$R2_BUCKET/$KEY"
          aws s3api get-object \
            --bucket "$R2_BUCKET" \
            --key "$KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            officials.db >/dev/null
          ls -lh officials.db

          if [ -n "$SHA" ]; then
            echo "Verifying SHA-256 against resolved expected value..."
            echo "$SHA  officials.db" | sha256sum -c -
          else
            echo "No expected SHA available (override path with allow_unverified); skipping verification."
          fi

      - name: Export officials to chunked directory
        working-directory: packages/shadow-atlas
        run: |
          # export-officials.ts takes positional <dbPath> [outputDir].
          # Flag form (--db / --output) silently parses --db as the
          # dbPath string and tries to open it as a SQLite file →
          # SQLITE_CANTOPEN.
          npx tsx scripts/export-officials.ts \
            ../../officials.db \
            output/chunked/

          # Count exported files
          OFFICIALS_COUNT=$(find output/chunked/ -path '*/officials/*.json' | wc -l | tr -d ' ')
          echo "Exported $OFFICIALS_COUNT officials files"

          echo "### Officials Export" >> $GITHUB_STEP_SUMMARY
          echo "- **Files exported:** $OFFICIALS_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload updated chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2b: Build Cell Tree Snapshot (parallel with export-officials)
  # =========================================================================
  build-cell-tree-snapshot:
    name: Build Cell Tree Snapshot
    runs-on: ubuntu-latest
    # Sized for full-US scale (1.88M cells × Poseidon2 sponge + hashPair
    # leaf computation, then ~1.88M hashPair calls walking up the SMT).
    # Leaf step is worker-parallelized across cores; tree-build remains
    # sequential. Empirically the prior 60-min cap hit timeout deep in
    # the leaf hash loop.
    timeout-minutes: 240
    env:
      # 8 GB OOM'd inside JSON.stringify — even with `null, 2` removed
      # and array-by-array streaming the wire-cells intermediate array
      # (1.88M cell objects, each with 24 hex strings) is bulky. 12 GB
      # fits the residency comfortably on the 16 GB runner. Reduce if
      # cell count drops or wire format slims.
      NODE_OPTIONS: '--max-old-space-size=12288'
    needs: [build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependency (@voter-protocol/crypto)
        # build-cell-tree-snapshot.ts imports Poseidon2Hasher from
        # @voter-protocol/crypto, whose dist/ is gitignored. `npm ci`
        # alone leaves the module unresolved (ERR_MODULE_NOT_FOUND);
        # we need to run its tsc first. Mirrors shadow-atlas-ci.yml.
        run: npm run build -w @voter-protocol/crypto

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Build cell tree snapshot
        working-directory: packages/shadow-atlas
        run: |
          # build-cell-tree-snapshot reads from the chunked directory structure
          npx tsx scripts/build-cell-tree-snapshot.ts \
            --from output/chunked/ \
            --output output/chunked/US/merkle/cell-tree-snapshot.json

          ls -lh output/chunked/US/merkle/cell-tree-snapshot.json

          echo "### Cell Tree Snapshot" >> $GITHUB_STEP_SUMMARY
          SNAPSHOT_SIZE=$(ls -lh output/chunked/US/merkle/cell-tree-snapshot.json | awk '{print $5}')
          echo "- **Snapshot size:** $SNAPSHOT_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload cell tree snapshot into chunked output
        uses: actions/upload-artifact@v4
        with:
          name: cell-tree-snapshot
          # The snapshot is split into <name>.json + <name>.cells.ndjson
          # to keep the JSON file under Node's 512 MB single-string cap;
          # upload the whole merkle dir so both files reach the consumer.
          path: packages/shadow-atlas/output/chunked/US/merkle/
          retention-days: 180

  # =========================================================================
  # Phase 2c: Generate Cell Chunks + District Index (depends on cell tree snapshot)
  # =========================================================================
  generate-cell-chunks:
    name: Generate Cell Chunks + District Index
    runs-on: ubuntu-latest
    # Sized to match the cell-tree-snapshot upstream: the SMT rebuild
    # inside buildCellMapTree does ~5-7M sequential Poseidon2 calls
    # (1.88M cells × sponge + hashPair + SMT insert path). 90 min hit
    # the cap mid-rebuild; 240 min matches what cell-tree-snapshot uses.
    timeout-minutes: 240
    needs: [build-cell-tree-snapshot]
    outputs:
      total_cell_chunks: ${{ steps.generate.outputs.total_cell_chunks }}
      total_cells: ${{ steps.generate.outputs.total_cells }}
      populated_slots: ${{ steps.generate.outputs.populated_slots }}
    env:
      # 8 GB OOM'd in [4/4] buildCellChunks: 1.88M cells × 22-element
      # sibling arrays + districts + tree state = several GB working set
      # at the depth-22 cell-map scale. 12 GB matches what cell-tree-snapshot
      # already runs with, well under the 16 GB runner cap.
      NODE_OPTIONS: '--max-old-space-size=12288'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependency (@voter-protocol/crypto)
        # generate-cell-chunks.ts imports src/tree-builder.ts, which
        # imports Poseidon2Hasher from @voter-protocol/crypto. dist/ is
        # gitignored; npm ci alone leaves the module unresolved.
        run: npm run build -w @voter-protocol/crypto

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Download chunked build (for existing districts/officials)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/

      - name: Cache TIGER tract centroids
        uses: actions/cache@v4
        with:
          path: packages/shadow-atlas/data/baf-cache
          key: tiger-centroids-2024-${{ hashFiles('packages/shadow-atlas/src/hydration/tract-centroid-index.ts') }}
          restore-keys: |
            tiger-centroids-2024-

      - name: Generate cell chunks and district index
        id: generate
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p data/baf-cache

          npx tsx scripts/generate-cell-chunks.ts \
            --snapshot output/chunked/US/merkle/cell-tree-snapshot.json \
            --output output/chunked \
            --cache-dir data/baf-cache

          # Extract stats
          TOTAL_CELL_CHUNKS=$(jq -r '.totalChunks' output/chunked/US/manifest-cells.json)
          TOTAL_CELLS=$(jq -r 'reduce (.chunks | to_entries[].value.cellCount) as $c (0; . + $c)' output/chunked/US/manifest-cells.json 2>/dev/null || echo "N/A")
          POPULATED_SLOTS=$(jq -r '.slots | keys | length' output/chunked/US/district-index.json)

          echo "total_cell_chunks=$TOTAL_CELL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT
          echo "populated_slots=$POPULATED_SLOTS" >> $GITHUB_OUTPUT

          echo "### Cell Chunks + District Index" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell chunks:** $TOTAL_CELL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Populated district slots:** $POPULATED_SLOTS of 24" >> $GITHUB_STEP_SUMMARY
          echo "- **District index size:** $(ls -lh output/chunked/US/district-index.json | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

          # Count unique congressional districts
          CD_COUNT=$(jq -r '.slots["0"] | keys | length' output/chunked/US/district-index.json 2>/dev/null || echo "N/A")
          echo "- **Congressional districts:** $CD_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output with cell chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2d: Build address index (NAD + TIGER ADDRFEAT → ZIP5 chunks)
  # =========================================================================
  # SEAM-CONTRACT v1 (atlas-address-index): emits US/addresses/{zip5}.json +
  # normalization.json + chunk-index.json and MERGES addressIndex* fields
  # (third manifest clock) into US/manifest.json, leaving the boundary and
  # officials clocks byte-unchanged. Runs AFTER generate-cell-chunks so the
  # artifact chain is boundary build → address build → validate → upload-r2;
  # a boundary republish can never drop addresses/ because the address job's
  # artifact is the superset the rest of the chain consumes.
  #
  # Fail-closed on schedule events: nad_vintage/addrfeat_vintage resolve to
  # 'unknown' and the build script THROWS before writing anything (same
  # discipline as tiger_vintage above).
  build-address-index:
    name: Build Address Index
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: [generate-cell-chunks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build (with cell chunks)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/

      # ADDRFEAT download cache — resume, not restart. County zips are
      # verified-complete (zip magic + EOCD) before reuse, so a re-run after
      # a transient census.gov failure skips every finished download instead
      # of repeating hours of them. The exact key is unique per attempt
      # (immutable caches can't be updated in place); restore always falls
      # through to the newest same-vintage prefix. Size fits comfortably:
      # national ADDRFEAT ≈ 680 MB zipped vs the 10 GB repo cache budget.
      - name: Restore ADDRFEAT download cache
        uses: actions/cache/restore@v4
        with:
          path: packages/shadow-atlas/data/addrfeat-cache
          key: addrfeat-${{ inputs.addrfeat_vintage || 'unknown' }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            addrfeat-${{ inputs.addrfeat_vintage || 'unknown' }}-

      - name: Build address index (NAD src:0 + ADDRFEAT src:1)
        id: build-address-index
        working-directory: packages/shadow-atlas
        run: |
          set -euo pipefail

          NAD_URL="${{ inputs.nad_url }}"
          STATES="${{ inputs.address_states }}"

          ARGS=( --addrfeat-dir data/addrfeat-cache
                 --addrfeat-vintage "${{ inputs.addrfeat_vintage || 'unknown' }}"
                 --output output/chunked )
          if [ -n "$STATES" ]; then
            ARGS+=( --states "$STATES" )
          fi
          mkdir -p data/addrfeat-cache

          if [ -n "$NAD_URL" ]; then
            # The NAD release is downloaded to disk first (not streamed)
            # so its content can be validated as a complete zip before the
            # multi-hour build consumes it. The upstream endpoint has been
            # observed serving an HTTP-200 JSON error body in place of the
            # archive during an outage — a streaming pipe (or a HEAD probe)
            # cannot catch that until the downstream parser dies partway
            # through the build, by which point real work is already lost.
            #
            # Disk math: the ~7.6 GB zip plus the ~2.8 GB ADDRFEAT cache
            # fit comfortably within ubuntu-latest's free disk. The ~30 GB
            # uncompressed NAD text still never touches disk — funzip
            # streams it straight into the build below, exactly as before.
            NAD_ZIP="data/nad-release.zip"
            rm -f "$NAD_ZIP"

            # Exit codes from validate_nad_zip: 0 = valid complete zip.
            # 2 = body doesn't start with the zip local-file-header magic
            # (e.g. a JSON error body) — not worth resuming, so the file is
            # discarded and the next attempt starts a clean download.
            # 3 = starts like a zip but has no end-of-central-directory
            # record in the tail — a genuinely truncated transfer, safe to
            # resume in place with -C -.
            validate_nad_zip() {
              node -e '
                const fs = require("fs");
                const p = process.argv[1];
                let size;
                try { size = fs.statSync(p).size; } catch { console.error("no file on disk"); process.exit(2); }
                if (size === 0) { console.error("empty file"); process.exit(2); }
                const fd = fs.openSync(p, "r");
                const head = Buffer.alloc(Math.min(4, size));
                fs.readSync(fd, head, 0, head.length, 0);
                if (!head.equals(Buffer.from([0x50, 0x4b, 0x03, 0x04]))) {
                  console.error("missing zip local-file-header magic (PK\\x03\\x04) at offset 0");
                  fs.closeSync(fd);
                  process.exit(2);
                }
                const tailLen = Math.min(65536, size);
                const tail = Buffer.alloc(tailLen);
                fs.readSync(fd, tail, 0, tailLen, size - tailLen);
                fs.closeSync(fd);
                if (tail.indexOf(Buffer.from([0x50, 0x4b, 0x05, 0x06])) === -1) {
                  console.error("no end-of-central-directory signature (PK\\x05\\x06) in last " + tailLen + " bytes -- truncated transfer");
                  process.exit(3);
                }
              ' "$1"
            }

            NAD_OK=0
            for attempt in 1 2 3; do
              echo "NAD download attempt $attempt/3..."
              curl -sSL --retry 3 --retry-all-errors -C - -o "$NAD_ZIP" "$NAD_URL" \
                || echo "curl exited non-zero on attempt $attempt (retries exhausted)"

              set +e
              VALIDATION_ERROR="$(validate_nad_zip "$NAD_ZIP" 2>&1 1>/dev/null)"
              RC=$?
              set -e

              if [ "$RC" -eq 0 ]; then
                NAD_OK=1
                break
              fi

              echo "::warning::NAD download attempt $attempt/3 failed validation: $VALIDATION_ERROR"
              SIZE=$(stat -c%s "$NAD_ZIP" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 0 ] && [ "$SIZE" -lt 1048576 ]; then
                echo "--- response body (first 300 bytes -- likely the upstream error, verbatim) ---"
                head -c 300 "$NAD_ZIP" || true
                echo
                echo "--- end response body ---"
              fi

              # A non-zip body (RC=2) isn't worth resuming -- discard it so
              # the next attempt starts a clean download instead of ranging
              # on top of garbage. A truncated-but-real zip (RC=3) is kept
              # so -C - can resume it.
              if [ "$RC" -eq 2 ]; then
                rm -f "$NAD_ZIP"
              fi

              if [ "$attempt" -lt 3 ]; then
                sleep 90
              fi
            done

            if [ "$NAD_OK" -ne 1 ]; then
              echo "::error::NAD upstream served a non-zip body after 3 attempts — upstream outage; re-dispatch with nad_url= for a ranges-only publish, or retry later"
              exit 1
            fi

            echo "- **NAD zip sha256 (computed):** $(sha256sum "$NAD_ZIP" | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY

            funzip < "$NAD_ZIP" \
              | npx tsx scripts/build-address-index.ts --nad - \
                  --nad-vintage "${{ inputs.nad_vintage || 'unknown' }}" \
                  "${ARGS[@]}"

            rm -f "$NAD_ZIP"
          else
            npx tsx scripts/build-address-index.ts "${ARGS[@]}"
          fi

          echo "### Address Index" >> $GITHUB_STEP_SUMMARY
          jq -r '"- **Chunks:** \(.addressIndex.totalChunks)\n- **Streets:** \(.addressIndex.totalStreets)\n- **Points:** \(.addressIndex.totalPoints)\n- **Ranges:** \(.addressIndex.totalRanges)\n- **NAD vintage:** \(.addressIndex.nadVintage)\n- **ADDRFEAT vintage:** \(.addressIndex.addrfeatVintage)"' \
            output/chunked/US/manifest.json >> $GITHUB_STEP_SUMMARY

      # Save even when the build FAILS — that is the whole point: the next
      # attempt resumes from the completed downloads. (actions/cache's
      # built-in post-save skips on failure, hence the explicit save step.)
      - name: Save ADDRFEAT download cache
        if: always() && steps.build-address-index.outcome != 'skipped'
        uses: actions/cache/save@v4
        with:
          path: packages/shadow-atlas/data/addrfeat-cache
          key: addrfeat-${{ inputs.addrfeat_vintage || 'unknown' }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload chunked output with addresses
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-addresses
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 3: Validate build (quality gate — blocks IPFS pin on failure)
  # =========================================================================
  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [export-officials, build-cell-tree-snapshot, generate-cell-chunks, build-address-index]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download complete build (with addresses)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-addresses
          path: packages/shadow-atlas/output/chunked/

      - name: Run validation checks
        working-directory: packages/shadow-atlas
        run: |
          # validate-build.ts exits non-zero on any failure.
          # This gates the entire downstream pipeline.
          # --strict: warnings fail too — this job runs AFTER build-address-index,
          # so a manifest missing the addressIndex section (a silently-dropped
          # merge) must be a hard failure here, never a WARN + "PASSED".
          npx tsx scripts/validate-build.ts output/chunked/ --strict

          echo "### Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** PASSED (all checks, strict)" >> $GITHUB_STEP_SUMMARY

      - name: Upload validated output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 4: Pin directory to IPFS via Storacha (single root CID)
  # =========================================================================
  # publish-ipfs job removed 2026-05-02 with the Storacha sunset.
  # When IPFS pinning resumes, restore a job at this point that:
  #   1. Downloads the chunked-validated artifact
  #   2. Invokes the new pinning script (Pinata/Lighthouse/Fleek)
  #   3. Outputs root_cid + uploads pin-results.json
  # Then re-add `--pin-results` to the push-cids invocation below and
  # rewire push-cids/update-registry/notify to consume the IPFS CID.

  # =========================================================================
  # Phase 4b: Upload to Cloudflare R2 (primary production read path)
  # =========================================================================
  upload-r2:
    name: Upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve-source, validate-build]
    outputs:
      atlas_base_url: ${{ steps.upload.outputs.atlas_base_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download validated build
        uses: actions/download-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/

      - name: Upload to R2
        id: upload
        working-directory: packages/shadow-atlas
        # Bulk upload uses R2's S3-compatible endpoint. The same
        # bucket-scoped access key pair is already used above for source
        # downloads, and avoids relying on a broad Cloudflare API token
        # for thousands of PUTs.
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: shadow-atlas
          R2_PUBLIC_URL: https://atlas.commons.email
        run: |
          npx tsx scripts/upload-to-r2.ts \
            --directory output/chunked/ \
            --output output/r2-upload-results.json \
            --prefix "${{ needs.resolve-source.outputs.version }}"

          # Extract versioned public URL for push-cids
          ATLAS_URL=$(jq -r '.publicUrl' output/r2-upload-results.json)
          if [ -z "$ATLAS_URL" ] || [ "$ATLAS_URL" = "null" ]; then
            echo "::error::R2 upload did not emit publicUrl."
            exit 1
          fi
          case "$ATLAS_URL" in
            https://atlas.commons.email/v*) ;;
            *)
              echo "::error::R2 upload emitted an unexpected non-versioned atlas URL: $ATLAS_URL"
              exit 1
              ;;
          esac
          echo "atlas_base_url=$ATLAS_URL" >> $GITHUB_OUTPUT

      - name: Write R2 summary
        run: |
          FILES=$(jq -r '.totalFiles' packages/shadow-atlas/output/r2-upload-results.json)
          SIZE_MB=$(jq -r '.totalSizeBytes / 1048576 | floor' packages/shadow-atlas/output/r2-upload-results.json)
          DURATION=$(jq -r '.durationMs / 1000 | floor' packages/shadow-atlas/output/r2-upload-results.json)
          VERIFIED=$(jq -r '.verified' packages/shadow-atlas/output/r2-upload-results.json)

          echo "## R2 Upload Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Files** | $FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| **Verified** | $VERIFIED |" >> $GITHUB_STEP_SUMMARY

      - name: Upload R2 results
        uses: actions/upload-artifact@v4
        with:
          name: r2-upload-results
          path: packages/shadow-atlas/output/r2-upload-results.json
          retention-days: 180

  # =========================================================================
  # Phase 5a: Push CID + R2 URL to Cloudflare Pages
  # =========================================================================
  push-cids:
    name: Push Config to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [upload-r2, build-cell-tree-snapshot]
    if: needs.upload-r2.result == 'success' && needs.build-cell-tree-snapshot.result == 'success' && inputs.push_cids != 'false'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate promotion prerequisites
        env:
          COMMONS_DEPLOY_TOKEN: ${{ secrets.COMMONS_DEPLOY_TOKEN }}
        run: |
          if [ -z "$COMMONS_DEPLOY_TOKEN" ]; then
            echo "::error::COMMONS_DEPLOY_TOKEN is required before mutating Cloudflare Pages config."
            echo "::error::Create a fine-grained token with Actions:write on communisaas/commons and store it as a repository secret."
            exit 1
          fi

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Push config to Cloudflare Pages
        working-directory: packages/shadow-atlas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'communique-site' }}
          ATLAS_BASE_URL: ${{ needs.upload-r2.outputs.atlas_base_url }}
        run: |
          # IPFS pinning is paused (2026-05-02). When restored, re-add
          # `--pin-results output/pin-results.json` and download the artifact.
          if [ -z "${ATLAS_BASE_URL:-}" ]; then
            echo "::error::upload-r2 did not produce ATLAS_BASE_URL; refusing to mutate Cloudflare Pages config."
            exit 1
          fi
          case "$ATLAS_BASE_URL" in
            https://atlas.commons.email/v*) ;;
            *)
              echo "::error::ATLAS_BASE_URL must be a versioned atlas URL, got: $ATLAS_BASE_URL"
              exit 1
              ;;
          esac

          CELL_MAP_ROOT=$(jq -r '.root' output/chunked/US/merkle/cell-tree-snapshot.json)
          CELL_MAP_DEPTH=$(jq -r '.depth' output/chunked/US/merkle/cell-tree-snapshot.json)
          if [ -z "$CELL_MAP_ROOT" ] || [ "$CELL_MAP_ROOT" = "null" ]; then
            echo "Error: cell-tree-snapshot.json did not contain .root" >&2
            exit 1
          fi
          if [ -z "$CELL_MAP_DEPTH" ] || [ "$CELL_MAP_DEPTH" = "null" ]; then
            echo "Error: cell-tree-snapshot.json did not contain .depth" >&2
            exit 1
          fi

          npx tsx scripts/push-cids.ts \
            --atlas-url "$ATLAS_BASE_URL" \
            --cell-map-root "$CELL_MAP_ROOT" \
            --cell-map-depth "$CELL_MAP_DEPTH" \
            --project "$CF_PAGES_PROJECT"

          echo "### Config Push" >> $GITHUB_STEP_SUMMARY
          echo "- **ATLAS_BASE_URL:** $ATLAS_BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **VITE_ATLAS_BASE_URL:** $ATLAS_BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **EXPECTED_CELL_MAP_ROOT:** \`$CELL_MAP_ROOT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **EXPECTED_CELL_MAP_DEPTH:** $CELL_MAP_DEPTH" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** $CF_PAGES_PROJECT" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Updated" >> $GITHUB_STEP_SUMMARY

      - name: Trigger Commons deployment
        env:
          GH_TOKEN: ${{ secrets.COMMONS_DEPLOY_TOKEN }}
          COMMONS_DEPLOY_REPO: ${{ vars.COMMONS_DEPLOY_REPO || 'communisaas/commons' }}
          COMMONS_DEPLOY_WORKFLOW: ${{ vars.COMMONS_DEPLOY_WORKFLOW || 'deploy.yml' }}
          COMMONS_DEPLOY_WORKFLOW_REF: ${{ vars.COMMONS_DEPLOY_WORKFLOW_REF || 'main' }}
          COMMONS_DEPLOY_BRANCH: ${{ vars.COMMONS_DEPLOY_BRANCH || 'production' }}
          COMMONS_DEPLOY_REF: ${{ vars.COMMONS_DEPLOY_REF || 'production' }}
        run: |
          set -euo pipefail

          if [ -z "$GH_TOKEN" ]; then
            echo "::error::COMMONS_DEPLOY_TOKEN is required to trigger the Commons deploy workflow."
            echo "::error::Create a fine-grained token with Actions:write on $COMMONS_DEPLOY_REPO and store it as a repository secret."
            exit 1
          fi

          triggered_after=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh workflow run "$COMMONS_DEPLOY_WORKFLOW" \
            --repo "$COMMONS_DEPLOY_REPO" \
            --ref "$COMMONS_DEPLOY_WORKFLOW_REF" \
            -f branch="$COMMONS_DEPLOY_BRANCH" \
            -f ref="$COMMONS_DEPLOY_REF"

          deploy_run_id=""
          deploy_run_url=""
          for attempt in {1..24}; do
            deploy_run=$(
              gh api \
                "repos/${COMMONS_DEPLOY_REPO}/actions/workflows/${COMMONS_DEPLOY_WORKFLOW}/runs?event=workflow_dispatch&per_page=20" \
              | jq -r --arg created "$triggered_after" '
                  [.workflow_runs[] | select(.created_at >= $created)]
                  | if length == 0 then
                      empty
                    else
                      sort_by(.created_at)
                      | reverse
                      | .[0]
                      | [.id, .html_url]
                      | @tsv
                    end
                '
            )

            if [ -n "$deploy_run" ]; then
              IFS=$'\t' read -r deploy_run_id deploy_run_url <<< "$deploy_run"
              break
            fi

            echo "Waiting for Commons deploy workflow run to appear (attempt ${attempt}/24)..."
            sleep 5
          done

          if [ -z "$deploy_run_id" ]; then
            echo "::error::Triggered Commons deploy workflow, but could not find the workflow_dispatch run."
            exit 1
          fi

          echo "Commons deploy run: $deploy_run_url"
          deploy_status=""
          deploy_conclusion=""
          for attempt in {1..150}; do
            deploy_state=$(
              gh api "repos/${COMMONS_DEPLOY_REPO}/actions/runs/${deploy_run_id}" \
              | jq -r '[.status, (.conclusion // ""), .html_url] | @tsv'
            )
            IFS=$'\t' read -r deploy_status deploy_conclusion deploy_run_url <<< "$deploy_state"
            echo "Commons deploy status: ${deploy_status}${deploy_conclusion:+/$deploy_conclusion}"

            if [ "$deploy_status" = "completed" ]; then
              break
            fi
            sleep 10
          done

          if [ "$deploy_status" != "completed" ]; then
            echo "::error::Commons deploy did not complete before the promotion wait timeout."
            echo "::error::Run: $deploy_run_url"
            exit 1
          fi
          if [ "$deploy_conclusion" != "success" ]; then
            echo "::error::Commons deploy completed with conclusion '${deploy_conclusion:-unknown}'."
            echo "::error::Run: $deploy_run_url"
            exit 1
          fi

          echo "### Commons Deploy Trigger" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** $COMMONS_DEPLOY_REPO" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** $COMMONS_DEPLOY_WORKFLOW@$COMMONS_DEPLOY_WORKFLOW_REF" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy branch:** $COMMONS_DEPLOY_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy ref:** $COMMONS_DEPLOY_REF" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy run:** $deploy_run_url" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy status:** Passed" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Phase 5b: Update on-chain registry (stub — future implementation)
  # =========================================================================
  update-registry:
    name: Update On-Chain Registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [resolve-source, upload-r2, push-cids]
    if: inputs.update_registry == 'true' && needs.push-cids.result == 'success'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Extract snapshot root and content locator
        id: extract-root
        # The on-chain SnapshotAnchor contract requires a non-empty string in
        # the `ipfsCid` field (SnapshotAnchor.sol:74 reverts on EmptyCid). With
        # IPFS pinning paused (2026-05-02), we anchor the versioned R2 URL as
        # the content-locator instead. The contract docstring still calls it
        # `ipfsCid` but downstream consumers should treat it as a generic
        # locator. When IPFS pinning resumes, swap this back to the IPFS CID.
        run: |
          ROOT=$(jq -r '.root' packages/shadow-atlas/output/chunked/US/merkle/cell-tree-snapshot.json)
          LOCATOR="${{ needs.upload-r2.outputs.atlas_base_url }}"
          if [ -z "$LOCATOR" ]; then
            echo "Error: upload-r2 produced no atlas_base_url output" >&2
            exit 1
          fi
          echo "cell_map_root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "ipfs_cid=$LOCATOR" >> "$GITHUB_OUTPUT"
          echo "Cell map root: $ROOT"
          echo "Content locator (anchored as ipfsCid): $LOCATOR"

      - name: Update on-chain registry
        working-directory: contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.SCROLL_RPC_URL }}
          CELL_MAP_ROOT: ${{ steps.extract-root.outputs.cell_map_root }}
          IPFS_CID: ${{ steps.extract-root.outputs.ipfs_cid }}
          # Deterministic epoch derived from the source version tag.
          # Failed reruns must NOT increment the on-chain epoch beyond
          # what the operator's published version represents.
          EPOCH: ${{ needs.resolve-source.outputs.epoch }}
          SNAPSHOT_ANCHOR_ADDRESS: ${{ vars.SNAPSHOT_ANCHOR_ADDRESS }}
        run: |
          read_registry() {
            local readback
            readback=$(
              cast call "$SNAPSHOT_ANCHOR_ADDRESS" \
                "getCurrentRoot()(bytes32,string,uint256)" \
                --rpc-url "$RPC_URL"
            )
            mapfile -t SNAPSHOT_READBACK <<< "$readback"

            READ_ROOT="${SNAPSHOT_READBACK[0]:-}"
            READ_LOCATOR="${SNAPSHOT_READBACK[1]:-}"
            READ_EPOCH="${SNAPSHOT_READBACK[2]:-}"
            # cast annotates uint256 lines with scientific notation, e.g.
            # `20260512 [2.026e7]`. Strip the bracketed suffix on every field
            # so idempotency comparisons match the workflow-derived values.
            READ_ROOT="${READ_ROOT%% \[*}"
            READ_LOCATOR="${READ_LOCATOR%% \[*}"
            READ_EPOCH="${READ_EPOCH%% \[*}"
            READ_LOCATOR="${READ_LOCATOR%\"}"
            READ_LOCATOR="${READ_LOCATOR#\"}"
          }

          registry_matches() {
            [ "${READ_ROOT,,}" = "${CELL_MAP_ROOT,,}" ] \
              && [ "$READ_LOCATOR" = "$IPFS_CID" ] \
              && [ "$READ_EPOCH" = "$EPOCH" ]
          }

          registry_action="broadcast"
          read_registry
          if registry_matches; then
            registry_action="already-current"
            registry_verified=true
          else
            forge script script/UpdateSnapshot.s.sol:UpdateSnapshot \
              --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY" --broadcast

            registry_verified=false
          fi

          for attempt in {1..12}; do
            read_registry

            if registry_matches; then
              registry_verified=true
              break
            fi

            echo "Registry readback mismatch on attempt ${attempt}/12; retrying..."
            sleep 5
          done

          if [ "$registry_verified" != "true" ]; then
            echo "::error::Registry readback did not match the intended snapshot."
            echo "::error::Expected root:    $CELL_MAP_ROOT"
            echo "::error::Actual root:      ${READ_ROOT:-<empty>}"
            echo "::error::Expected locator: $IPFS_CID"
            echo "::error::Actual locator:   ${READ_LOCATOR:-<empty>}"
            echo "::error::Expected epoch:   $EPOCH"
            echo "::error::Actual epoch:     ${READ_EPOCH:-<empty>}"
            exit 1
          fi

          echo "### On-Chain Registry Update" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell Map Root:** \`$CELL_MAP_ROOT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Content Locator (anchored as ipfsCid):** $IPFS_CID" >> $GITHUB_STEP_SUMMARY
          echo "- **Epoch:** $EPOCH" >> $GITHUB_STEP_SUMMARY
          echo "- **Action:** $registry_action" >> $GITHUB_STEP_SUMMARY
          echo "- **Readback:** Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_IPFS pinning paused 2026-05-02; the R2 URL is anchored in the ipfsCid field as a content-locator. Restore the IPFS CID here once pinning resumes._" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Notifications
  # =========================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build-chunked
      - export-officials
      - build-cell-tree-snapshot
      - generate-cell-chunks
      - build-address-index
      - validate-build
      - upload-r2
      - push-cids
      - update-registry
    if: always()
    steps:
      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const totalChunks = '${{ needs.build-chunked.outputs.total_chunks }}' || 'N/A';
            const totalCells = '${{ needs.build-chunked.outputs.total_cells }}' || 'N/A';
            const atlasUrl = '${{ needs.upload-r2.outputs.atlas_base_url }}' || 'N/A';
            const pushRequested = '${{ inputs.push_cids }}';
            const registryRequested = '${{ inputs.update_registry }}';

            const title = `Shadow Atlas Quarterly Update - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Quarterly Shadow Atlas Update (Chunked Pipeline)',
              '',
              `**Date:** ${new Date().toISOString()}`,
              '',
              '### Pipeline Results',
              '| Job | Status |',
              '|-----|--------|',
              `| Build Chunked Mapping | ${{ needs.build-chunked.result }} |`,
              `| Export Officials | ${{ needs.export-officials.result }} |`,
              `| Build Cell Tree | ${{ needs.build-cell-tree-snapshot.result }} |`,
              `| Generate Cell Chunks | ${{ needs.generate-cell-chunks.result }} |`,
              `| Build Address Index | ${{ needs.build-address-index.result }} |`,
              `| Validate Build | ${{ needs.validate-build.result }} |`,
              `| Upload to R2 | ${{ needs.upload-r2.result }} |`,
              `| Push CIDs | ${{ needs.push-cids.result }} |`,
              `| Update Registry | ${{ needs.update-registry.result }} |`,
              '',
              '### Build Metrics',
              `- **Total chunks:** ${totalChunks}`,
              `- **Total cells:** ${totalCells}`,
              `- **R2 URL:** ${atlasUrl}`,
              `- **Push config requested:** ${pushRequested}`,
              `- **Registry update requested:** ${registryRequested}`,
              `- **Cell chunks:** ${{ needs.generate-cell-chunks.outputs.total_cell_chunks || 'N/A' }}`,
              `- **District slots:** ${{ needs.generate-cell-chunks.outputs.populated_slots || 'N/A' }}/24`,
              `- **Resolution:** 7 (child) / 3 (parent) — ~5.16 km² per cell`,
              '',
              '### Read Path',
              atlasUrl !== 'N/A'
                ? `- [manifest.json](${atlasUrl}/US/manifest.json)`
                : '- *R2 upload failed*',
              '',
              '_IPFS pinning paused 2026-05-02. Restore a `Pin to IPFS` row + gateway links above when pinning resumes._',
              '',
              '---',
              '*Automatically created by the quarterly update workflow (chunked pipeline v3).*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['quarterly-update', 'shadow-atlas', 'automated']
            });

  # =========================================================================
  # Cleanup old artifacts (keep last 4 quarters = 1 year)
  # =========================================================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [notify]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const ARTIFACT_NAMES = [
              'chunked-build',
              'chunked-with-officials',
              'cell-tree-snapshot',
              'chunked-validated',
              'chunked-with-cell-chunks',
              'chunked-with-addresses',
              'r2-upload-results',
              // Legacy artifact names (from old monolithic pipeline + Storacha-era pinning)
              'h3-mapping',
              'officials',
              'pin-results',
            ];

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const workflow = workflows.find(w => w.name === context.workflow);
            if (!workflow) {
              core.warning(`Could not find workflow named ${context.workflow}; skipping artifact cleanup.`);
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              per_page: 100
            });
            const successfulRunById = new Map(
              runs
                .filter(run => run.conclusion === 'success')
                .map(run => [run.id, run])
            );

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const relevantArtifacts = artifacts
              .filter(a => ARTIFACT_NAMES.includes(a.name))
              .filter(a => successfulRunById.has(a.workflow_run?.id))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Group by name, keep last 4 of each (1 year of quarterly runs)
            const counts = {};
            for (const artifact of relevantArtifacts) {
              counts[artifact.name] = (counts[artifact.name] || 0) + 1;
              if (counts[artifact.name] > 4) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  console.log(`Deleted artifact: ${artifact.name} (${artifact.created_at})`);
                } catch (e) {
                  console.log(`Failed to delete artifact ${artifact.name}: ${e.message}`);
                }
              }
            }
