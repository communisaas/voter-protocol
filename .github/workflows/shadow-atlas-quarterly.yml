name: Shadow Atlas Quarterly Update

# Chunked pipeline: build H3 chunks (~8 KB each), export per-district officials,
# validate quality gate, upload to R2 (production read path), push ATLAS_BASE_URL
# to Cloudflare Pages, update on-chain registry.
#
# IPFS pinning (publish-ipfs job + Storacha) was removed 2026-05-02 with the
# Storacha sunset. R2 (atlas.commons.email) is now the production read path.
# When IPFS pinning resumes, restore a `publish-ipfs` job ahead of `push-cids`
# and add `--pin-results` back to the push-cids invocation.
#
# See: docs/specs/CHUNKED-ATLAS-PIPELINE-SPEC.md (Phase 4)

on:
  workflow_dispatch:
    inputs:
      expected_manifest_sha256:
        description: 'sha256 of source/manifest.json. Required when db_source is empty. Operators paste the value emitted by `npm run publish:source`.'
        required: false
        type: string
        default: ''
      db_source:
        description: 'Override Shadow Atlas DB URL. Leave empty to resolve from manifest. Requires db_source_sha256 unless allow_unverified.'
        required: false
        type: string
        default: ''
      db_source_sha256:
        description: 'sha256 of override db_source. Required when db_source is set unless allow_unverified="I-UNDERSTAND".'
        required: false
        type: string
        default: ''
      officials_db_source:
        description: 'Override officials DB URL. Empty resolves from manifest. Requires officials_db_source_sha256 unless allow_unverified.'
        required: false
        type: string
        default: ''
      officials_db_source_sha256:
        description: 'sha256 of override officials_db_source. Required when officials_db_source is set unless allow_unverified="I-UNDERSTAND".'
        required: false
        type: string
        default: ''
      allow_unverified:
        description: 'Type "I-UNDERSTAND" to skip SHA verification on override URLs. Friction is intentional.'
        required: false
        type: string
        default: ''
      push_cids:
        description: 'Push ATLAS_BASE_URL to Cloudflare Pages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      update_registry:
        description: 'Update on-chain registry with new R2 URL + cellMapRoot'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Serialize quarterly publishes — two operators triggering simultaneously
# would clobber each other's `chunked-build` artifact (download-artifact@v4
# resolves by name, not run_id). cancel-in-progress=false because killing
# a running publish mid-broadcast on Scroll would be worse than queueing.
concurrency:
  group: shadow-atlas-quarterly
  cancel-in-progress: false
  # schedule:
  #   # Quarterly: 1st day of Jan, Apr, Jul, Oct at 2 AM UTC
  #   - cron: '0 2 1 1,4,7,10 *'

env:
  NODE_VERSION: '20'
  CHUNKED_OUTPUT_DIR: packages/shadow-atlas/output/chunked
  # Source manifest published by `npm run publish:source` in shadow-atlas.
  # Public-readable through the Atlas Worker. The resolve-source-version
  # step in jobs that consume the SQLite reads `currentVersion` here and
  # builds db_url + officials_url + their expected SHA-256 from it.
  ATLAS_SOURCE_MANIFEST: 'https://atlas.commons.email/source/manifest.json'

jobs:
  # =========================================================================
  # Phase 0: Resolve source artifacts ONCE so every consumer job sees the
  # same version. Two jobs each fetching the manifest independently would
  # frankenstein-blend versions if `publish:source` lands mid-run.
  # =========================================================================
  resolve-source:
    name: Resolve Source Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      epoch: ${{ steps.resolve.outputs.epoch }}
      db_url: ${{ steps.resolve.outputs.db_url }}
      db_sha: ${{ steps.resolve.outputs.db_sha }}
      officials_url: ${{ steps.resolve.outputs.officials_url }}
      officials_sha: ${{ steps.resolve.outputs.officials_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve manifest + override discipline
        id: resolve
        # Resolution order:
        #   1. If override URLs present, require matching sha256 (or
        #      allow_unverified="I-UNDERSTAND") — silent SHA-skip is a
        #      footgun.
        #   2. Otherwise, fetch manifest body and trust it via:
        #      Ed25519 signature (preferred when public key set) +
        #      operator-pasted sha256 pin + allow_unverified.
        #   3. Use `jq -er` and require exactly one matching build entry
        #      so duplicate or empty results fail loud rather than
        #      silently producing multi-line GITHUB_OUTPUT (output
        #      injection vector).
        #   4. Constrain resolved URLs to atlas.commons.email so a
        #      poisoned manifest can't redirect downloads to an
        #      attacker-controlled origin.
        env:
          # Public key (PEM or RAW:hex) to verify the manifest's Ed25519
          # signature. Stored as a repo VARIABLE (vars.*), not a secret —
          # public keys are public. When unset, signature verification is
          # skipped and the workflow falls back to the sha-pin / allow-
          # unverified path. Once a public key is published, set this
          # variable so all future runs require a valid signature.
          MANIFEST_SIGNING_PUBLIC_KEY: ${{ vars.MANIFEST_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          ALLOW="${{ inputs.allow_unverified }}"
          DB_OVERRIDE="${{ inputs.db_source }}"
          DB_OVERRIDE_SHA="${{ inputs.db_source_sha256 }}"
          OFF_OVERRIDE="${{ inputs.officials_db_source }}"
          OFF_OVERRIDE_SHA="${{ inputs.officials_db_source_sha256 }}"
          MANIFEST_SHA_PIN="${{ inputs.expected_manifest_sha256 }}"

          require_sha() {
            local url="$1" sha="$2" label="$3"
            if [ -n "$url" ] && [ -z "$sha" ] && [ "$ALLOW" != "I-UNDERSTAND" ]; then
              echo "Override $label requires its sha256 input, or allow_unverified=I-UNDERSTAND." >&2
              exit 1
            fi
          }
          require_sha "$DB_OVERRIDE" "$DB_OVERRIDE_SHA" "db_source"
          require_sha "$OFF_OVERRIDE" "$OFF_OVERRIDE_SHA" "officials_db_source"

          guard_url() {
            # Origin pinning. Override URLs are operator-typed and may
            # legitimately point elsewhere; manifest-resolved URLs MUST
            # be on atlas.commons.email to limit blast radius of a
            # poisoned manifest.
            local url="$1" label="$2" allow_external="$3"
            case "$url" in
              *$'\n'*)
                echo "$label contains newline — refusing." >&2; exit 1;;
            esac
            if [ "$allow_external" != "true" ]; then
              case "$url" in
                https://atlas.commons.email/*) ;;
                *) echo "$label not on atlas.commons.email: $url" >&2; exit 1;;
              esac
            fi
          }

          if [ -n "$DB_OVERRIDE" ] || [ -n "$OFF_OVERRIDE" ]; then
            guard_url "$DB_OVERRIDE" "db_source" "true"
            guard_url "$OFF_OVERRIDE" "officials_db_source" "true"
          fi

          if [ -n "$DB_OVERRIDE" ]; then
            DB_URL="$DB_OVERRIDE"
            DB_SHA="$DB_OVERRIDE_SHA"
            VERSION="override"
          fi
          if [ -n "$OFF_OVERRIDE" ]; then
            OFF_URL="$OFF_OVERRIDE"
            OFF_SHA="$OFF_OVERRIDE_SHA"
          fi

          if [ -z "${DB_URL:-}" ] || [ -z "${OFF_URL:-}" ]; then
            echo "Fetching $ATLAS_SOURCE_MANIFEST"

            # Write curl output directly to a tmpfile rather than via
            # `$(curl ...)` capture. POSIX command substitution strips
            # ALL trailing newlines, which would (a) make every signed
            # publish fail Ed25519 verification — publish-source.ts signs
            # the exact bytes including the trailing `\n`, and (b) make
            # the operator-pasted sha-pin always mismatch.
            MANIFEST_TMP=$(mktemp)
            SIG_TMP=$(mktemp)
            PUBKEY_TMP=$(mktemp)
            trap 'rm -f "$MANIFEST_TMP" "$SIG_TMP" "$PUBKEY_TMP"' EXIT

            curl -fsSL --retry 3 --retry-delay 5 \
              -o "$MANIFEST_TMP" \
              "$ATLAS_SOURCE_MANIFEST?t=$RANDOM" \
              -H 'Cache-Control: no-cache'

            # Trust the manifest body via, in priority order:
            #   1. Ed25519 signature (if MANIFEST_SIGNING_PUBLIC_KEY is
            #      set) — the deepest defense; an R2-write compromise
            #      alone can't forge a valid sig.
            #   2. Operator-pasted sha256 pin (`expected_manifest_sha256`).
            #   3. allow_unverified="I-UNDERSTAND" (ad-hoc test runs).
            # Active defenses are additive (multiple may apply), not
            # alternatives. At least one must succeed.
            VERIFIED_VIA=""
            if [ -n "${MANIFEST_SIGNING_PUBLIC_KEY:-}" ]; then
              echo "Verifying manifest Ed25519 signature..."
              if ! curl -fsSL --retry 3 --retry-delay 5 \
                -o "$SIG_TMP" \
                "${ATLAS_SOURCE_MANIFEST}.sig?t=$RANDOM" \
                -H 'Cache-Control: no-cache'; then
                echo "Public key is set but no signature exists at ${ATLAS_SOURCE_MANIFEST}.sig" >&2
                echo "Either: (a) the publisher didn't sign — run publish:source with MANIFEST_SIGNING_PRIVATE_KEY set," >&2
                echo "or (b) the .sig was deleted post-publish — re-publish with signing enabled." >&2
                exit 1
              fi
              if ! npx tsx packages/shadow-atlas/scripts/verify-manifest.ts \
                --manifest "$MANIFEST_TMP" \
                --signature "$SIG_TMP" \
                --public-key env:MANIFEST_SIGNING_PUBLIC_KEY; then
                echo "Manifest signature verification FAILED — aborting." >&2
                exit 1
              fi
              VERIFIED_VIA="ed25519"
            fi

            if [ -n "$MANIFEST_SHA_PIN" ]; then
              GOT=$(sha256sum "$MANIFEST_TMP" | awk '{print $1}')
              if [ "$GOT" != "$MANIFEST_SHA_PIN" ]; then
                echo "Manifest sha mismatch: $GOT vs pin $MANIFEST_SHA_PIN" >&2
                exit 1
              fi
              echo "Manifest pin verified ($GOT)"
              VERIFIED_VIA="${VERIFIED_VIA:+$VERIFIED_VIA+}sha-pin"
            fi

            if [ -z "$VERIFIED_VIA" ]; then
              if [ -z "$DB_OVERRIDE" ] && [ "$ALLOW" != "I-UNDERSTAND" ]; then
                echo "Manifest body is unverified. Provide one of:" >&2
                echo "  - MANIFEST_SIGNING_PUBLIC_KEY workflow var (Ed25519 sig)" >&2
                echo "  - expected_manifest_sha256 input (operator-pasted sha)" >&2
                echo "  - allow_unverified=I-UNDERSTAND (ad-hoc test runs only)" >&2
                exit 1
              fi
              echo "Manifest unverified (allow_unverified=I-UNDERSTAND)."
              VERIFIED_VIA="unverified"
            fi
            echo "Manifest trust: $VERIFIED_VIA"

            VERSION=$(jq -er '.currentVersion' < "$MANIFEST_TMP")

            if [ -z "${DB_URL:-}" ]; then
              DB_URL=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["shadow-atlas-full.db"].url end' < "$MANIFEST_TMP")
              DB_SHA=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["shadow-atlas-full.db"].sha256 end' < "$MANIFEST_TMP")
              guard_url "$DB_URL" "db_url (manifest)" "false"
            fi
            if [ -z "${OFF_URL:-}" ]; then
              OFF_URL=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["officials.db"].url end' < "$MANIFEST_TMP")
              OFF_SHA=$(jq -er --arg v "$VERSION" '
                [.builds[] | select(.version==$v)]
                | if length != 1 then error("expected exactly one build for \($v), got \(length)") else .[0].files["officials.db"].sha256 end' < "$MANIFEST_TMP")
              guard_url "$OFF_URL" "officials_url (manifest)" "false"
            fi
          fi

          # Deterministic epoch derived from the version tag, NOT from
          # github.run_number — failed reruns must not increment the
          # on-chain epoch beyond what the operator intended.
          if [[ "$VERSION" =~ ^v([0-9]{8})$ ]]; then
            EPOCH="${BASH_REMATCH[1]}"
          else
            # Override path: fall back to a synthetic epoch from a SHA
            # prefix to avoid run_number drift on retries.
            EPOCH=$(printf '%s' "${DB_URL}${DB_SHA}" | sha256sum | awk '{print "0x" substr($1,1,8)}')
            EPOCH=$((EPOCH))
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "epoch=$EPOCH" >> "$GITHUB_OUTPUT"
          echo "db_url=$DB_URL" >> "$GITHUB_OUTPUT"
          echo "db_sha=$DB_SHA" >> "$GITHUB_OUTPUT"
          echo "officials_url=$OFF_URL" >> "$GITHUB_OUTPUT"
          echo "officials_sha=$OFF_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION epoch=$EPOCH"
          echo "  db: $DB_URL"
          echo "  officials: $OFF_URL"

  # =========================================================================
  # Phase 1: Build chunked H3→district mapping
  # =========================================================================
  build-chunked:
    name: Build Chunked H3 Mapping
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [resolve-source]
    outputs:
      total_chunks: ${{ steps.build.outputs.total_chunks }}
      total_cells: ${{ steps.build.outputs.total_cells }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download Shadow Atlas database
        run: |
          set -euo pipefail
          DB_URL="${{ needs.resolve-source.outputs.db_url }}"
          DB_SHA="${{ needs.resolve-source.outputs.db_sha }}"
          echo "Downloading $DB_URL"
          curl -fSL --retry 3 --retry-delay 5 -o shadow-atlas-full.db "$DB_URL"
          ls -lh shadow-atlas-full.db

          if [ -n "$DB_SHA" ]; then
            echo "Verifying SHA-256 against resolved expected value..."
            echo "$DB_SHA  shadow-atlas-full.db" | sha256sum -c -
          else
            echo "No expected SHA available (override path with allow_unverified); skipping verification."
          fi

      - name: Build chunked mapping
        id: build
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p output/chunked

          npx tsx scripts/build-chunked-mapping.ts \
            ../../shadow-atlas-full.db \
            output/chunked/

          # Extract stats from the manifest
          TOTAL_CHUNKS=$(jq -r '
            [.countries[].layers[].chunkCount] | add // 0
          ' output/chunked/manifest.json)
          TOTAL_CELLS=$(jq -r '
            [.countries[].layers[].cellCount] | add // 0
          ' output/chunked/manifest.json)

          echo "total_chunks=$TOTAL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT

          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total chunks:** $TOTAL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Total cells:** $TOTAL_CELLS" >> $GITHUB_STEP_SUMMARY
          echo "- **Output directory:** output/chunked/" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2a: Export per-district officials files (depends on build-chunked)
  # =========================================================================
  export-officials:
    name: Export Officials Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve-source, build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Download officials database
        run: |
          set -euo pipefail
          URL="${{ needs.resolve-source.outputs.officials_url }}"
          SHA="${{ needs.resolve-source.outputs.officials_sha }}"
          echo "Downloading officials DB from: $URL"
          curl -fSL --retry 3 --retry-delay 5 -o officials.db "$URL"
          ls -lh officials.db

          if [ -n "$SHA" ]; then
            echo "Verifying SHA-256 against resolved expected value..."
            echo "$SHA  officials.db" | sha256sum -c -
          else
            echo "No expected SHA available (override path with allow_unverified); skipping verification."
          fi

      - name: Export officials to chunked directory
        working-directory: packages/shadow-atlas
        run: |
          npx tsx scripts/export-officials.ts \
            --db ../../officials.db \
            --output output/chunked/

          # Count exported files
          OFFICIALS_COUNT=$(find output/chunked/ -path '*/officials/*.json' | wc -l | tr -d ' ')
          echo "Exported $OFFICIALS_COUNT officials files"

          echo "### Officials Export" >> $GITHUB_STEP_SUMMARY
          echo "- **Files exported:** $OFFICIALS_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload updated chunked output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 2b: Build Cell Tree Snapshot (parallel with export-officials)
  # =========================================================================
  build-cell-tree-snapshot:
    name: Build Cell Tree Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-chunked]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download chunked build artifact
        uses: actions/download-artifact@v4
        with:
          name: chunked-build
          path: packages/shadow-atlas/output/chunked/

      - name: Build cell tree snapshot
        working-directory: packages/shadow-atlas
        run: |
          # build-cell-tree-snapshot reads from the chunked directory structure
          npx tsx scripts/build-cell-tree-snapshot.ts \
            --from output/chunked/ \
            --output output/chunked/US/merkle/cell-tree-snapshot.json

          ls -lh output/chunked/US/merkle/cell-tree-snapshot.json

          echo "### Cell Tree Snapshot" >> $GITHUB_STEP_SUMMARY
          SNAPSHOT_SIZE=$(ls -lh output/chunked/US/merkle/cell-tree-snapshot.json | awk '{print $5}')
          echo "- **Snapshot size:** $SNAPSHOT_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload cell tree snapshot into chunked output
        uses: actions/upload-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/cell-tree-snapshot.json
          retention-days: 180

  # =========================================================================
  # Phase 2c: Generate Cell Chunks + District Index (depends on cell tree snapshot)
  # =========================================================================
  generate-cell-chunks:
    name: Generate Cell Chunks + District Index
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-cell-tree-snapshot]
    outputs:
      total_cell_chunks: ${{ steps.generate.outputs.total_cell_chunks }}
      total_cells: ${{ steps.generate.outputs.total_cells }}
      populated_slots: ${{ steps.generate.outputs.populated_slots }}
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Download chunked build (for existing districts/officials)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-officials
          path: packages/shadow-atlas/output/chunked/

      - name: Cache TIGER tract centroids
        uses: actions/cache@v4
        with:
          path: packages/shadow-atlas/data/baf-cache
          key: tiger-centroids-2024-${{ hashFiles('packages/shadow-atlas/src/hydration/tract-centroid-index.ts') }}
          restore-keys: |
            tiger-centroids-2024-

      - name: Generate cell chunks and district index
        id: generate
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p data/baf-cache

          npx tsx scripts/generate-cell-chunks.ts \
            --snapshot output/chunked/US/merkle/cell-tree-snapshot.json \
            --output output/chunked \
            --cache-dir data/baf-cache

          # Extract stats
          TOTAL_CELL_CHUNKS=$(jq -r '.totalChunks' output/chunked/US/manifest-cells.json)
          TOTAL_CELLS=$(jq -r 'reduce (.chunks | to_entries[].value.cellCount) as $c (0; . + $c)' output/chunked/US/manifest-cells.json 2>/dev/null || echo "N/A")
          POPULATED_SLOTS=$(jq -r '.slots | keys | length' output/chunked/US/district-index.json)

          echo "total_cell_chunks=$TOTAL_CELL_CHUNKS" >> $GITHUB_OUTPUT
          echo "total_cells=$TOTAL_CELLS" >> $GITHUB_OUTPUT
          echo "populated_slots=$POPULATED_SLOTS" >> $GITHUB_OUTPUT

          echo "### Cell Chunks + District Index" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell chunks:** $TOTAL_CELL_CHUNKS" >> $GITHUB_STEP_SUMMARY
          echo "- **Populated district slots:** $POPULATED_SLOTS of 24" >> $GITHUB_STEP_SUMMARY
          echo "- **District index size:** $(ls -lh output/chunked/US/district-index.json | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

          # Count unique congressional districts
          CD_COUNT=$(jq -r '.slots["0"] | keys | length' output/chunked/US/district-index.json 2>/dev/null || echo "N/A")
          echo "- **Congressional districts:** $CD_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload chunked output with cell chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 3: Validate build (quality gate — blocks IPFS pin on failure)
  # =========================================================================
  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [export-officials, build-cell-tree-snapshot, generate-cell-chunks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download complete build (with cell chunks)
        uses: actions/download-artifact@v4
        with:
          name: chunked-with-cell-chunks
          path: packages/shadow-atlas/output/chunked/

      - name: Run validation checks
        working-directory: packages/shadow-atlas
        run: |
          # validate-build.ts exits non-zero on any failure.
          # This gates the entire downstream pipeline.
          npx tsx scripts/validate-build.ts output/chunked/

          echo "### Validation" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** PASSED (all 7 checks)" >> $GITHUB_STEP_SUMMARY

      - name: Upload validated output
        uses: actions/upload-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/
          retention-days: 180

  # =========================================================================
  # Phase 4: Pin directory to IPFS via Storacha (single root CID)
  # =========================================================================
  # publish-ipfs job removed 2026-05-02 with the Storacha sunset.
  # When IPFS pinning resumes, restore a job at this point that:
  #   1. Downloads the chunked-validated artifact
  #   2. Invokes the new pinning script (Pinata/Lighthouse/Fleek)
  #   3. Outputs root_cid + uploads pin-results.json
  # Then re-add `--pin-results` to the push-cids invocation below and
  # rewire push-cids/update-registry/notify to consume the IPFS CID.

  # =========================================================================
  # Phase 4b: Upload to Cloudflare R2 (primary production read path)
  # =========================================================================
  upload-r2:
    name: Upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate-build]
    outputs:
      atlas_base_url: ${{ steps.upload.outputs.atlas_base_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download validated build
        uses: actions/download-artifact@v4
        with:
          name: chunked-validated
          path: packages/shadow-atlas/output/chunked/

      - name: Upload to R2
        id: upload
        working-directory: packages/shadow-atlas
        # Single-token model (2026-05-02): upload-to-r2.ts drives every
        # PUT through `wrangler r2 object put` using CLOUDFLARE_API_TOKEN.
        # No S3-compat AKID/secret pair is needed.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: shadow-atlas
          R2_PUBLIC_URL: https://atlas.commons.email
        run: |
          npx tsx scripts/upload-to-r2.ts \
            --directory output/chunked/ \
            --output output/r2-upload-results.json

          # Extract versioned public URL for push-cids
          ATLAS_URL=$(jq -r '.publicUrl' output/r2-upload-results.json)
          echo "atlas_base_url=$ATLAS_URL" >> $GITHUB_OUTPUT

      - name: Write R2 summary
        run: |
          FILES=$(jq -r '.totalFiles' packages/shadow-atlas/output/r2-upload-results.json)
          SIZE_MB=$(jq -r '.totalSizeBytes / 1048576 | floor' packages/shadow-atlas/output/r2-upload-results.json)
          DURATION=$(jq -r '.durationMs / 1000 | floor' packages/shadow-atlas/output/r2-upload-results.json)
          VERIFIED=$(jq -r '.verified' packages/shadow-atlas/output/r2-upload-results.json)

          echo "## R2 Upload Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Files** | $FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| **Verified** | $VERIFIED |" >> $GITHUB_STEP_SUMMARY

      - name: Upload R2 results
        uses: actions/upload-artifact@v4
        with:
          name: r2-upload-results
          path: packages/shadow-atlas/output/r2-upload-results.json
          retention-days: 180

  # =========================================================================
  # Phase 5a: Push CID + R2 URL to Cloudflare Pages
  # =========================================================================
  push-cids:
    name: Push Config to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [upload-r2]
    if: needs.upload-r2.result == 'success' && inputs.push_cids != 'false'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Push config to Cloudflare Pages
        working-directory: packages/shadow-atlas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ATLAS_BASE_URL: ${{ needs.upload-r2.outputs.atlas_base_url || 'https://atlas.commons.email' }}
        run: |
          # IPFS pinning is paused (2026-05-02). When restored, re-add
          # `--pin-results output/pin-results.json` and download the artifact.
          npx tsx scripts/push-cids.ts \
            --atlas-url "$ATLAS_BASE_URL" \
            --project commons

          echo "### Config Push" >> $GITHUB_STEP_SUMMARY
          echo "- **ATLAS_BASE_URL:** $ATLAS_BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** commons" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Updated" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Phase 5b: Update on-chain registry (stub — future implementation)
  # =========================================================================
  update-registry:
    name: Update On-Chain Registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [resolve-source, upload-r2]
    if: inputs.update_registry == 'true'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Download cell tree snapshot
        uses: actions/download-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/chunked/US/merkle/

      - name: Extract snapshot root and content locator
        id: extract-root
        # The on-chain SnapshotAnchor contract requires a non-empty string in
        # the `ipfsCid` field (SnapshotAnchor.sol:74 reverts on EmptyCid). With
        # IPFS pinning paused (2026-05-02), we anchor the versioned R2 URL as
        # the content-locator instead. The contract docstring still calls it
        # `ipfsCid` but downstream consumers should treat it as a generic
        # locator. When IPFS pinning resumes, swap this back to the IPFS CID.
        run: |
          ROOT=$(jq -r '.root' packages/shadow-atlas/output/chunked/US/merkle/cell-tree-snapshot.json)
          LOCATOR="${{ needs.upload-r2.outputs.atlas_base_url }}"
          if [ -z "$LOCATOR" ]; then
            echo "Error: upload-r2 produced no atlas_base_url output" >&2
            exit 1
          fi
          echo "cell_map_root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "ipfs_cid=$LOCATOR" >> "$GITHUB_OUTPUT"
          echo "Cell map root: $ROOT"
          echo "Content locator (anchored as ipfsCid): $LOCATOR"

      - name: Update on-chain registry
        working-directory: contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.SCROLL_RPC_URL }}
          CELL_MAP_ROOT: ${{ steps.extract-root.outputs.cell_map_root }}
          IPFS_CID: ${{ steps.extract-root.outputs.ipfs_cid }}
          # Deterministic epoch derived from the source version tag.
          # Failed reruns must NOT increment the on-chain epoch beyond
          # what the operator's published version represents.
          EPOCH: ${{ needs.resolve-source.outputs.epoch }}
          SNAPSHOT_ANCHOR_ADDRESS: ${{ vars.SNAPSHOT_ANCHOR_ADDRESS }}
        run: |
          forge script script/UpdateSnapshot.s.sol:UpdateSnapshot \
            --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY" --broadcast

          echo "### On-Chain Registry Update" >> $GITHUB_STEP_SUMMARY
          echo "- **Cell Map Root:** \`$CELL_MAP_ROOT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Content Locator (anchored as ipfsCid):** $IPFS_CID" >> $GITHUB_STEP_SUMMARY
          echo "- **Epoch:** $EPOCH" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_IPFS pinning paused 2026-05-02; the R2 URL is anchored in the ipfsCid field as a content-locator. Restore the IPFS CID here once pinning resumes._" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Notifications
  # =========================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build-chunked
      - export-officials
      - build-cell-tree-snapshot
      - generate-cell-chunks
      - validate-build
      - upload-r2
      - push-cids
      - update-registry
    if: always()
    steps:
      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const totalChunks = '${{ needs.build-chunked.outputs.total_chunks }}' || 'N/A';
            const totalCells = '${{ needs.build-chunked.outputs.total_cells }}' || 'N/A';
            const atlasUrl = '${{ needs.upload-r2.outputs.atlas_base_url }}' || 'N/A';

            const title = `Shadow Atlas Quarterly Update - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Quarterly Shadow Atlas Update (Chunked Pipeline)',
              '',
              `**Date:** ${new Date().toISOString()}`,
              '',
              '### Pipeline Results',
              '| Job | Status |',
              '|-----|--------|',
              `| Build Chunked Mapping | ${{ needs.build-chunked.result }} |`,
              `| Export Officials | ${{ needs.export-officials.result }} |`,
              `| Build Cell Tree | ${{ needs.build-cell-tree-snapshot.result }} |`,
              `| Generate Cell Chunks | ${{ needs.generate-cell-chunks.result }} |`,
              `| Validate Build | ${{ needs.validate-build.result }} |`,
              `| Upload to R2 | ${{ needs.upload-r2.result }} |`,
              `| Push CIDs | ${{ needs.push-cids.result }} |`,
              `| Update Registry | ${{ needs.update-registry.result }} |`,
              '',
              '### Build Metrics',
              `- **Total chunks:** ${totalChunks}`,
              `- **Total cells:** ${totalCells}`,
              `- **R2 URL:** ${atlasUrl}`,
              `- **Cell chunks:** ${{ needs.generate-cell-chunks.outputs.total_cell_chunks || 'N/A' }}`,
              `- **District slots:** ${{ needs.generate-cell-chunks.outputs.populated_slots || 'N/A' }}/24`,
              `- **Resolution:** 7 (child) / 3 (parent) — ~5.16 km² per cell`,
              '',
              '### Read Path',
              atlasUrl !== 'N/A'
                ? `- [manifest.json](${atlasUrl}/US/manifest.json)`
                : '- *R2 upload failed*',
              '',
              '_IPFS pinning paused 2026-05-02. Restore a `Pin to IPFS` row + gateway links above when pinning resumes._',
              '',
              '---',
              '*Automatically created by the quarterly update workflow (chunked pipeline v3).*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['quarterly-update', 'shadow-atlas', 'automated']
            });

      - name: Notify Slack (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ATLAS_URL="${{ needs.upload-r2.outputs.atlas_base_url }}"
          TOTAL_CHUNKS="${{ needs.build-chunked.outputs.total_chunks }}"
          BUILD_RESULT="${{ needs.build-chunked.result }}"
          VALIDATE_RESULT="${{ needs.validate-build.result }}"
          R2_RESULT="${{ needs.upload-r2.result }}"

          curl -fsSL -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"Shadow Atlas Quarterly Update Complete\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Shadow Atlas Quarterly Update*\n• Build: ${BUILD_RESULT}\n• Validation: ${VALIDATE_RESULT}\n• R2 Upload: ${R2_RESULT}\n• Chunks: ${TOTAL_CHUNKS}\n• R2 URL: ${ATLAS_URL:-N/A}\"
                  }
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

  # =========================================================================
  # Cleanup old artifacts (keep last 4 quarters = 1 year)
  # =========================================================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [notify]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const ARTIFACT_NAMES = [
              'chunked-build',
              'chunked-with-officials',
              'cell-tree-snapshot',
              'chunked-validated',
              'chunked-with-cell-chunks',
              'r2-upload-results',
              // Legacy artifact names (from old monolithic pipeline + Storacha-era pinning)
              'h3-mapping',
              'officials',
              'pin-results',
            ];

            const artifactsResponse = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const relevantArtifacts = artifactsResponse.data.artifacts
              .filter(a => ARTIFACT_NAMES.includes(a.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Group by name, keep last 4 of each (1 year of quarterly runs)
            const counts = {};
            for (const artifact of relevantArtifacts) {
              counts[artifact.name] = (counts[artifact.name] || 0) + 1;
              if (counts[artifact.name] > 4) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  console.log(`Deleted artifact: ${artifact.name} (${artifact.created_at})`);
                } catch (e) {
                  console.log(`Failed to delete artifact ${artifact.name}: ${e.message}`);
                }
              }
            }
