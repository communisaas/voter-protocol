name: Shadow Atlas Quarterly Update

# Quarterly pipeline: build static artifacts, pin to IPFS, update on-chain registry.
# Eliminates runtime server dependency for reads — all data is content-addressed.
on:
  workflow_dispatch:
    inputs:
      db_source:
        description: 'Shadow Atlas DB source URL (R2/S3/HTTP)'
        required: true
        type: string
      publish_ipfs:
        description: 'Pin artifacts to IPFS via Storacha'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      update_registry:
        description: 'Update on-chain registry with new CIDs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  # schedule:
  #   # Quarterly: 1st day of Jan, Apr, Jul, Oct at 2 AM UTC
  #   - cron: '0 2 1 1,4,7,10 *'

env:
  NODE_VERSION: '20'
  OUTPUT_DIR: packages/shadow-atlas/output

jobs:
  # ---- Phase A1: Build H3→district mapping ----
  build-h3-mapping:
    name: Build H3→District Mapping
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      cell_count: ${{ steps.build.outputs.cell_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download Shadow Atlas database
        run: |
          echo "Downloading shadow-atlas-full.db..."
          curl -L -o shadow-atlas-full.db "${{ inputs.db_source }}"
          ls -lh shadow-atlas-full.db

      - name: Build H3 mapping
        id: build
        working-directory: packages/shadow-atlas
        run: |
          mkdir -p output
          npx tsx scripts/build-h3-mapping.ts ../../shadow-atlas-full.db output/

          # Extract cell count from metadata
          CELL_COUNT=$(cat output/h3-mapping-metadata.json | jq -r '.matchedCells')
          echo "cell_count=$CELL_COUNT" >> $GITHUB_OUTPUT
          echo "Mapped $CELL_COUNT H3 cells"

      - name: Upload H3 mapping artifacts
        uses: actions/upload-artifact@v4
        with:
          name: h3-mapping
          path: |
            packages/shadow-atlas/output/h3-district-mapping.json.br
            packages/shadow-atlas/output/h3-district-mapping-sample.json
            packages/shadow-atlas/output/h3-mapping-metadata.json
          retention-days: 180

  # ---- Phase A1: Export officials data ----
  export-officials:
    name: Export Officials Data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download officials database
        run: |
          # Officials DB is small (~500KB), stored alongside the main DB
          DB_URL="${{ inputs.db_source }}"
          OFFICIALS_URL="${DB_URL%/*}/officials.db"
          curl -L -o officials.db "$OFFICIALS_URL" || echo "Officials DB not at derived URL, skipping"

      - name: Export to JSON
        run: |
          mkdir -p packages/shadow-atlas/output

          if [ -f officials.db ]; then
            # Export officials table to JSON
            sqlite3 -json officials.db "SELECT * FROM officials" > packages/shadow-atlas/output/officials.json
            echo "Exported $(wc -l < packages/shadow-atlas/output/officials.json) lines"
          else
            echo '{"error": "officials.db not available"}' > packages/shadow-atlas/output/officials.json
            echo "Officials DB not available — placeholder created"
          fi

      - name: Upload officials artifact
        uses: actions/upload-artifact@v4
        with:
          name: officials
          path: packages/shadow-atlas/output/officials.json
          retention-days: 180

  # ---- Phase A1b: Build Cell Tree Snapshot (Tree 2 Merkle tree) ----
  build-cell-tree-snapshot:
    name: Build Cell Tree Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-h3-mapping]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download H3 mapping artifact
        uses: actions/download-artifact@v4
        with:
          name: h3-mapping
          path: packages/shadow-atlas/output/

      - name: Decompress H3 mapping
        run: |
          # build-cell-tree-snapshot.ts needs uncompressed JSON
          cd packages/shadow-atlas/output
          if [ -f h3-district-mapping.json.br ]; then
            # Use node for Brotli decompression (portable)
            node -e "
              const { brotliDecompressSync } = require('zlib');
              const { readFileSync, writeFileSync } = require('fs');
              const br = readFileSync('h3-district-mapping.json.br');
              writeFileSync('h3-district-mapping.json', brotliDecompressSync(br));
              console.log('Decompressed: ' + (br.length/1024).toFixed(0) + ' KB → ' + (brotliDecompressSync(br).length/1024/1024).toFixed(1) + ' MB');
            "
          fi

      - name: Build cell tree snapshot
        working-directory: packages/shadow-atlas
        run: |
          npx tsx scripts/build-cell-tree-snapshot.ts \
            --from output/h3-district-mapping.json \
            --output output/cell-tree-snapshot.json

          ls -lh output/cell-tree-snapshot.json

      - name: Upload cell tree snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: cell-tree-snapshot
          path: packages/shadow-atlas/output/cell-tree-snapshot.json
          retention-days: 180

  # ---- Phase A2: Pin to IPFS via Storacha ----
  publish-ipfs:
    name: Pin to IPFS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-h3-mapping, export-officials, build-cell-tree-snapshot]
    if: inputs.publish_ipfs != 'false'
    outputs:
      pin_results: ${{ steps.pin.outputs.results }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/shadow-atlas/output/
          merge-multiple: true

      - name: Pin artifacts to Storacha
        id: pin
        working-directory: packages/shadow-atlas
        env:
          STORACHA_SPACE_DID: ${{ secrets.STORACHA_SPACE_DID }}
          STORACHA_AGENT_KEY: ${{ secrets.STORACHA_AGENT_KEY }}
          STORACHA_PROOF: ${{ secrets.STORACHA_PROOF }}
        run: |
          npx tsx scripts/pin-to-ipfs.ts \
            --all output/ \
            --output output/pin-results.json

          # Output results for downstream jobs
          echo "results=$(cat output/pin-results.json | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Create IPFS gateway links
        run: |
          echo "## IPFS Pinning Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cat packages/shadow-atlas/output/pin-results.json | jq -r '.artifacts[] | "- **\(.name)**: [\(.cid)](\(.gateway))"' >> $GITHUB_STEP_SUMMARY

      - name: Upload pin results
        uses: actions/upload-artifact@v4
        with:
          name: pin-results
          path: packages/shadow-atlas/output/pin-results.json
          retention-days: 180

  # ---- Phase C1: Update on-chain registry ----
  update-registry:
    name: Update On-Chain Registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-ipfs]
    if: inputs.update_registry == 'true'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Download pin results
        uses: actions/download-artifact@v4
        with:
          name: pin-results
          path: packages/shadow-atlas/output/

      - name: Update on-chain registry
        working-directory: contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.SCROLL_RPC_URL }}
        run: |
          # TODO: Implement Foundry script to update DistrictRegistry with:
          # - New Merkle root hash
          # - IPFS CIDs for each artifact
          # - Quarterly epoch number
          #
          # Script should call DistrictRegistry.updateSnapshot(root, cids)
          # or equivalent function once contract supports IPFS CID storage.
          echo "On-chain registry update not yet implemented"
          echo "Pin results:"
          cat ../packages/shadow-atlas/output/pin-results.json | jq '.artifacts[] | {name, cid}'

  # ---- Notifications ----
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build-h3-mapping, export-officials, publish-ipfs, update-registry]
    if: always()
    steps:
      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const cellCount = '${{ needs.build-h3-mapping.outputs.cell_count }}' || 'N/A';

            const title = `Shadow Atlas Quarterly Update - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Quarterly Shadow Atlas Update',
              '',
              `**Date:** ${new Date().toISOString()}`,
              '',
              '### Job Results',
              '| Job | Status |',
              '|-----|--------|',
              `| Build H3 Mapping | ${{ needs.build-h3-mapping.result }} |`,
              `| Export Officials | ${{ needs.export-officials.result }} |`,
              `| Pin to IPFS | ${{ needs.publish-ipfs.result }} |`,
              `| Update Registry | ${{ needs.update-registry.result }} |`,
              '',
              '### H3 Mapping',
              `- **Cells mapped:** ${cellCount}`,
              `- **Resolution:** 7 (~5.16 km² per cell)`,
              '',
              '---',
              '*Automatically created by the quarterly update workflow.*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['quarterly-update', 'shadow-atlas', 'automated']
            });

      - name: Notify Slack (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"Shadow Atlas Quarterly Update Complete — ${{ needs.build-h3-mapping.result }}\"
            }" \
            $SLACK_WEBHOOK_URL

  # ---- Cleanup ----
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [notify]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifactsResponse = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const quarterlyArtifacts = artifactsResponse.data.artifacts
              .filter(a => ['h3-mapping', 'officials', 'cell-tree-snapshot', 'pin-results'].includes(a.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Keep last 4 quarters (1 year), delete rest
            for (let i = 4; i < quarterlyArtifacts.length; i++) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: quarterlyArtifacts[i].id
              });
              console.log(`Deleted artifact: ${quarterlyArtifacts[i].name}`);
            }
